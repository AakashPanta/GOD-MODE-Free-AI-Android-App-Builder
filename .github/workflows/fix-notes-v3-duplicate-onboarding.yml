name: Fix Notes V3 Duplicate Onboarding

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove duplicate old onboarding screen
        run: |
          set -e

          OLD_FILE="app/src/main/java/com/notes/app/ui/screens/OnboardingScreen.kt"

          if [ -f "$OLD_FILE" ]; then
            rm -f "$OLD_FILE"
            echo "Removed duplicate $OLD_FILE"
          else
            echo "Duplicate onboarding file already removed"
          fi

      - name: Commit V3 duplicate fix
        run: |
          git config user.name "Notes V3 Fix Bot"
          git config user.email "actions@github.com"

          git add .
          git commit -m "Fix V3 duplicate onboarding screen" || echo "No changes to commit"
          git push || echo "Push skipped"
