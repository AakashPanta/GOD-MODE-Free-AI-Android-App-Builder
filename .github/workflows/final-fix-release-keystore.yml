name: Final Fix Release Keystore

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fix Gradle and workflow keystore paths
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          # 1. Force app/build.gradle.kts to use app/signing/notes-release.jks
          gradle = Path("app/build.gradle.kts")
          if not gradle.exists():
              raise SystemExit("app/build.gradle.kts not found")

          text = gradle.read_text()

          text = re.sub(
              r'storeFile\s*=\s*file\([^)]+\)',
              'storeFile = file("signing/notes-release.jks")',
              text
          )

          text = re.sub(
              r'storePassword\s*=\s*"[^"]*"',
              'storePassword = "notespassword"',
              text
          )

          text = re.sub(
              r'keyAlias\s*=\s*"[^"]*"',
              'keyAlias = "noteskey"',
              text
          )

          text = re.sub(
              r'keyPassword\s*=\s*"[^"]*"',
              'keyPassword = "notespassword"',
              text
          )

          gradle.write_text(text)

          # 2. Patch all workflows so keystore is created in app/signing/
          workflow_dir = Path(".github/workflows")
          if workflow_dir.exists():
              for wf in workflow_dir.glob("*.yml"):
                  wf_text = wf.read_text()

                  wf_text = wf_text.replace(
                      'KEYSTORE_PATH="signing/notes-release.jks"',
                      'KEYSTORE_PATH="app/signing/notes-release.jks"'
                  )

                  wf_text = wf_text.replace(
                      "KEYSTORE_PATH='signing/notes-release.jks'",
                      "KEYSTORE_PATH='app/signing/notes-release.jks'"
                  )

                  wf_text = wf_text.replace(
                      "SIGNING_KEYSTORE_PATH: signing/notes-release.jks",
                      "SIGNING_KEYSTORE_PATH: app/signing/notes-release.jks"
                  )

                  wf_text = wf_text.replace(
                      "signing/notes-release.jks",
                      "app/signing/notes-release.jks"
                  )

                  wf.write_text(wf_text)

          PY

      - name: Ensure release keystore generation step exists in production workflow
        run: |
          python3 <<'PY'
          from pathlib import Path

          workflow = Path(".github/workflows/notes-production-pipeline.yml")

          if not workflow.exists():
              print("notes-production-pipeline.yml not found, skipping direct pipeline patch")
              raise SystemExit(0)

          text = workflow.read_text()

          # Remove accidental duplicated app/app path if previous replacements caused it.
          text = text.replace("app/app/signing/notes-release.jks", "app/signing/notes-release.jks")

          required_step = '''
      - name: Create release keystore
        run: |
          KEYSTORE_PATH="app/signing/notes-release.jks"
          mkdir -p app/signing

          if [ ! -f "$KEYSTORE_PATH" ]; then
            keytool -genkeypair \\
              -v \\
              -keystore "$KEYSTORE_PATH" \\
              -storepass notespassword \\
              -alias noteskey \\
              -keypass notespassword \\
              -keyalg RSA \\
              -keysize 2048 \\
              -validity 10000 \\
              -dname "CN=Notes,O=Notes App,C=US"
          fi

          ls -la app/signing
          keytool -list -keystore "$KEYSTORE_PATH" -storepass notespassword || true
'''

          if "KEYSTORE_PATH=\"app/signing/notes-release.jks\"" not in text:
              marker = "      - name: Create debug keystore"
              if marker in text:
                  text = text.replace(marker, required_step + "\n" + marker)
              else:
                  marker = "      - name: Ensure Gradle wrapper"
                  text = text.replace(marker, required_step + "\n" + marker)

          workflow.write_text(text)
          PY

      - name: Create local app signing folder
        run: |
          mkdir -p app/signing
          touch app/signing/.gitkeep

      - name: Commit final keystore fix
        run: |
          git config user.name "Final Keystore Fix Bot"
          git config user.email "actions@github.com"

          git add .
          git commit -m "Final fix release keystore path and generation" || echo "No changes to commit"
          git push || echo "Push skipped"
