name: Fix Project Final Stable

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fix gradle-wrapper.properties
        run: |
          mkdir -p gradle/wrapper

          cat > gradle/wrapper/gradle-wrapper.properties <<'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.10.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: Fix settings.gradle.kts
        run: |
          cat > settings.gradle.kts <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = "Notes"
          include(":app")
          EOF

      - name: Fix root build.gradle.kts
        run: |
          cat > build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application") version "8.5.2" apply false
              id("org.jetbrains.kotlin.android") version "1.9.24" apply false
          }
          EOF

      - name: Fix AndroidManifest theme mismatch
        run: |
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/values-night

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar" />
          </resources>
          EOF

          cat > app/src/main/res/values-night/styles.xml <<'EOF'
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.NoActionBar" />
          </resources>
          EOF

      - name: Fix gradle.properties
        run: |
          cat > gradle.properties <<'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
          kotlin.code.style=official
          EOF

      - name: Ensure signing folder exists
        run: |
          mkdir -p app/signing
          touch app/signing/.gitkeep

      - name: Commit stabilization fix
        run: |
          git config user.name "Final Project Stabilizer"
          git config user.email "actions@github.com"

          git add .
          git commit -m "Final stabilization: fix Gradle, SDK, theme, wrapper" || echo "No changes"
          git push || echo "Push skipped"
