- name: Generate Android project with selected AI (robust)
  env:
    APP_PROMPT: ${{ github.event.inputs.app_prompt }}
    PACKAGE_NAME: ${{ github.event.inputs.package_name }}
    APP_NAME: ${{ github.event.inputs.app_name }}
  run: |
    python3 .godmode/create_prompt.py

    echo "================ FIRST GENERATION ================="
    ollama run "${{ github.event.inputs.ai_model }}" < .godmode/main_prompt.txt > .godmode/ai_output.txt || true

    echo "================ CHECK OUTPUT ================="

    if ! grep -q "FILE:" .godmode/ai_output.txt; then
      echo "AI FAILED → Retrying with stronger instruction..."

      cat <<EOF > .godmode/retry_prompt.txt
      IMPORTANT: Your last output was invalid.

      You MUST follow EXACT format.

      ONLY output files using:

      FILE: path
      \`\`\`kotlin
      code
      \`\`\`

      NO TEXT OUTSIDE FILE BLOCKS.

      NOW REGENERATE FULL PROJECT:

      $(cat .godmode/main_prompt.txt)
      EOF

      ollama run "${{ github.event.inputs.ai_model }}" < .godmode/retry_prompt.txt > .godmode/ai_output.txt || true
    fi

    echo "================ FINAL VALIDATION ================="

    if ! grep -q "FILE:" .godmode/ai_output.txt; then
      echo "AI STILL FAILED → FALLBACK MODE ACTIVATED"

      mkdir -p app/src/main/java/com/example/fallback

      cat > settings.gradle.kts <<'EOF'
      rootProject.name = "FallbackApp"
      include(":app")
      EOF

      cat > build.gradle.kts <<'EOF'
      plugins {
          id("com.android.application") version "8.5.0" apply false
          id("org.jetbrains.kotlin.android") version "1.9.24" apply false
      }
      EOF

      mkdir -p app

      cat > app/build.gradle.kts <<'EOF'
      plugins {
          id("com.android.application")
          id("org.jetbrains.kotlin.android")
      }

      android {
          namespace = "com.example.fallback"
          compileSdk = 36

          defaultConfig {
              applicationId = "com.example.fallback"
              minSdk = 26
              targetSdk = 36
              versionCode = 1
              versionName = "1.0"
          }

          buildFeatures {
              compose = true
          }

          composeOptions {
              kotlinCompilerExtensionVersion = "1.5.14"
          }

          kotlinOptions {
              jvmTarget = "17"
          }
      }

      dependencies {
          implementation("androidx.core:core-ktx:1.13.1")
          implementation("androidx.activity:activity-compose:1.9.0")
          implementation(platform("androidx.compose:compose-bom:2025.01.00"))
          implementation("androidx.compose.ui:ui")
          implementation("androidx.compose.material3:material3")
      }
      EOF

      mkdir -p app/src/main/java/com/example/fallback

      cat > app/src/main/java/com/example/fallback/MainActivity.kt <<'EOF'
      package com.example.fallback

      import android.os.Bundle
      import androidx.activity.ComponentActivity
      import androidx.activity.compose.setContent
      import androidx.compose.material3.Text

      class MainActivity : ComponentActivity() {
          override fun onCreate(savedInstanceState: Bundle?) {
              super.onCreate(savedInstanceState)
              setContent {
                  Text("Fallback App Running")
              }
          }
      }
      EOF

    else
      echo "AI OUTPUT VALID → Writing files"
      python3 .godmode/write_files.py
    fi
