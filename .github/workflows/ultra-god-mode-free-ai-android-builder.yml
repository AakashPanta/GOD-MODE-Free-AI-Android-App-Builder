name: Stable Notes App Builder

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: "App name"
        required: true
        default: "NoteForge"
        type: string

      package_name:
        description: "Android package name"
        required: true
        default: "com.mrrobot.noteforge"
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Generate Stable Kotlin Notes App
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      ANDROID_HOME: /opt/android-sdk
      ANDROID_SDK_ROOT: /opt/android-sdk

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install packages
        run: |
          sudo apt update
          sudo apt install -y curl wget unzip zip git openjdk-17-jdk gradle

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android SDK
        run: |
          sudo mkdir -p "$ANDROID_HOME/cmdline-tools"
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          sudo rm -rf "$ANDROID_HOME/cmdline-tools/latest"
          sudo mv cmdline-tools "$ANDROID_HOME/cmdline-tools/latest"

          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

          yes | sudo "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true

          sudo "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Generate complete Kotlin Notes app
        run: |
          APP_NAME="${{ github.event.inputs.app_name }}"
          PACKAGE_NAME="${{ github.event.inputs.package_name }}"
          PACKAGE_PATH="$(echo "$PACKAGE_NAME" | tr '.' '/')"

          rm -rf app build.gradle.kts settings.gradle.kts gradle gradlew gradlew.bat

          mkdir -p app/src/main/java/$PACKAGE_PATH
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/values-night

          cat > settings.gradle.kts <<EOF
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = "$APP_NAME"
          include(":app")
          EOF

          cat > build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application") version "8.5.2" apply false
              id("org.jetbrains.kotlin.android") version "1.9.24" apply false
          }
          EOF

          cat > app/build.gradle.kts <<EOF
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }

          android {
              namespace = "$PACKAGE_NAME"
              compileSdk = 36

              defaultConfig {
                  applicationId = "$PACKAGE_NAME"
                  minSdk = 26
                  targetSdk = 36
                  versionCode = 1
                  versionName = "1.0"
              }

              buildFeatures {
                  compose = true
              }

              composeOptions {
                  kotlinCompilerExtensionVersion = "1.5.14"
              }

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = "17"
              }
          }

          dependencies {
              implementation("androidx.core:core-ktx:1.13.1")
              implementation("androidx.activity:activity-compose:1.9.2")
              implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.8.4")
              implementation("androidx.lifecycle:lifecycle-viewmodel-compose:2.8.4")
              implementation(platform("androidx.compose:compose-bom:2024.06.00"))
              implementation("androidx.compose.ui:ui")
              implementation("androidx.compose.ui:ui-tooling-preview")
              implementation("androidx.compose.foundation:foundation")
              implementation("androidx.compose.material3:material3")
              implementation("androidx.compose.material:material-icons-extended")
              debugImplementation("androidx.compose.ui:ui-tooling")
          }
          EOF

          cat > app/src/main/AndroidManifest.xml <<EOF
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="true"
                  android:label="$APP_NAME"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar" />
          </resources>
          EOF

          cat > app/src/main/res/values-night/styles.xml <<'EOF'
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.NoActionBar" />
          </resources>
          EOF

          cat > app/src/main/java/$PACKAGE_PATH/MainActivity.kt <<EOF
          package $PACKAGE_NAME

          import android.os.Bundle
          import androidx.activity.ComponentActivity
          import androidx.activity.compose.setContent
          import androidx.compose.foundation.layout.*
          import androidx.compose.foundation.lazy.LazyColumn
          import androidx.compose.foundation.lazy.items
          import androidx.compose.foundation.shape.RoundedCornerShape
          import androidx.compose.material.icons.Icons
          import androidx.compose.material.icons.filled.*
          import androidx.compose.material3.*
          import androidx.compose.runtime.*
          import androidx.compose.ui.Alignment
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.text.font.FontWeight
          import androidx.compose.ui.unit.dp
          import androidx.lifecycle.ViewModel
          import androidx.lifecycle.viewmodel.compose.viewModel
          import java.text.SimpleDateFormat
          import java.util.Date
          import java.util.Locale
          import java.util.UUID

          class MainActivity : ComponentActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContent {
                      NoteForgeTheme {
                          NotesApp()
                      }
                  }
              }
          }

          data class Note(
              val id: String = UUID.randomUUID().toString(),
              val title: String,
              val body: String,
              val folder: String = "Personal",
              val tag: String = "General",
              val pinned: Boolean = false,
              val favorite: Boolean = false,
              val archived: Boolean = false,
              val trashed: Boolean = false,
              val updatedAt: String = currentTime()
          )

          fun currentTime(): String {
              return SimpleDateFormat("dd MMM yyyy, HH:mm", Locale.getDefault()).format(Date())
          }

          enum class Screen {
              HOME, EDITOR, TRASH, ARCHIVE, SETTINGS
          }

          class NotesViewModel : ViewModel() {
              var screen by mutableStateOf(Screen.HOME)
                  private set

              var selectedNote by mutableStateOf<Note?>(null)
                  private set

              var query by mutableStateOf("")
                  private set

              var notes by mutableStateOf(
                  listOf(
                      Note(
                          title = "Welcome to $APP_NAME",
                          body = "This is a production-ready offline notes app foundation built with Kotlin, Jetpack Compose, Material 3, and MVVM.",
                          folder = "Inbox",
                          tag = "Start",
                          pinned = true
                      ),
                      Note(
                          title = "Premium dashboard",
                          body = "Use pinned notes, search, archive, trash, favorites, folders, and a clean editor.",
                          folder = "Productivity",
                          tag = "UI",
                          favorite = true
                      )
                  )
              )
                  private set

              fun navigate(target: Screen) {
                  screen = target
              }

              fun updateQuery(value: String) {
                  query = value
              }

              fun newNote() {
                  selectedNote = null
                  screen = Screen.EDITOR
              }

              fun edit(note: Note) {
                  selectedNote = note
                  screen = Screen.EDITOR
              }

              fun save(title: String, body: String, folder: String, tag: String) {
                  val cleanTitle = title.ifBlank { "Untitled Note" }
                  val cleanBody = body.ifBlank { "No content" }

                  val existing = selectedNote

                  notes = if (existing == null) {
                      listOf(
                          Note(
                              title = cleanTitle,
                              body = cleanBody,
                              folder = folder.ifBlank { "Personal" },
                              tag = tag.ifBlank { "General" }
                          )
                      ) + notes
                  } else {
                      notes.map {
                          if (it.id == existing.id) {
                              it.copy(
                                  title = cleanTitle,
                                  body = cleanBody,
                                  folder = folder.ifBlank { "Personal" },
                                  tag = tag.ifBlank { "General" },
                                  updatedAt = currentTime()
                              )
                          } else {
                              it
                          }
                      }
                  }

                  selectedNote = null
                  screen = Screen.HOME
              }

              fun togglePin(note: Note) {
                  notes = notes.map {
                      if (it.id == note.id) it.copy(pinned = !it.pinned, updatedAt = currentTime()) else it
                  }
              }

              fun toggleFavorite(note: Note) {
                  notes = notes.map {
                      if (it.id == note.id) it.copy(favorite = !it.favorite, updatedAt = currentTime()) else it
                  }
              }

              fun archive(note: Note) {
                  notes = notes.map {
                      if (it.id == note.id) it.copy(archived = true, trashed = false, updatedAt = currentTime()) else it
                  }
              }

              fun restore(note: Note) {
                  notes = notes.map {
                      if (it.id == note.id) it.copy(archived = false, trashed = false, updatedAt = currentTime()) else it
                  }
              }

              fun moveToTrash(note: Note) {
                  notes = notes.map {
                      if (it.id == note.id) it.copy(trashed = true, archived = false, updatedAt = currentTime()) else it
                  }
              }

              fun deleteForever(note: Note) {
                  notes = notes.filterNot { it.id == note.id }
              }

              fun duplicate(note: Note) {
                  notes = listOf(
                      note.copy(
                          id = UUID.randomUUID().toString(),
                          title = note.title + " Copy",
                          updatedAt = currentTime()
                      )
                  ) + notes
              }

              val activeNotes: List<Note>
                  get() = notes.filter { !it.trashed && !it.archived }

              val filteredNotes: List<Note>
                  get() {
                      val base = when (screen) {
                          Screen.TRASH -> notes.filter { it.trashed }
                          Screen.ARCHIVE -> notes.filter { it.archived && !it.trashed }
                          else -> activeNotes
                      }

                      if (query.isBlank()) return base

                      return base.filter {
                          it.title.contains(query, true) ||
                          it.body.contains(query, true) ||
                          it.folder.contains(query, true) ||
                          it.tag.contains(query, true)
                      }
                  }
          }

          @Composable
          fun NoteForgeTheme(content: @Composable () -> Unit) {
              MaterialTheme(
                  colorScheme = darkColorScheme(
                      primary = androidx.compose.ui.graphics.Color(0xFF8EA7FF),
                      secondary = androidx.compose.ui.graphics.Color(0xFFB8C7FF),
                      background = androidx.compose.ui.graphics.Color(0xFF10131A),
                      surface = androidx.compose.ui.graphics.Color(0xFF181C25)
                  ),
                  content = content
              )
          }

          @OptIn(ExperimentalMaterial3Api::class)
          @Composable
          fun NotesApp(vm: NotesViewModel = viewModel()) {
              Scaffold(
                  topBar = {
                      TopAppBar(
                          title = {
                              Column {
                                  Text("$APP_NAME", fontWeight = FontWeight.Bold)
                                  Text(
                                      text = "${'$'}{vm.activeNotes.size} active notes",
                                      style = MaterialTheme.typography.labelMedium
                                  )
                              }
                          },
                          actions = {
                              IconButton(onClick = { vm.navigate(Screen.SETTINGS) }) {
                                  Icon(Icons.Default.Settings, contentDescription = "Settings")
                              }
                          }
                      )
                  },
                  floatingActionButton = {
                      if (vm.screen != Screen.EDITOR) {
                          FloatingActionButton(onClick = { vm.newNote() }) {
                              Icon(Icons.Default.Add, contentDescription = "New note")
                          }
                      }
                  },
                  bottomBar = {
                      NavigationBar {
                          NavigationBarItem(
                              selected = vm.screen == Screen.HOME,
                              onClick = { vm.navigate(Screen.HOME) },
                              icon = { Icon(Icons.Default.Home, contentDescription = null) },
                              label = { Text("Home") }
                          )
                          NavigationBarItem(
                              selected = vm.screen == Screen.ARCHIVE,
                              onClick = { vm.navigate(Screen.ARCHIVE) },
                              icon = { Icon(Icons.Default.Archive, contentDescription = null) },
                              label = { Text("Archive") }
                          )
                          NavigationBarItem(
                              selected = vm.screen == Screen.TRASH,
                              onClick = { vm.navigate(Screen.TRASH) },
                              icon = { Icon(Icons.Default.Delete, contentDescription = null) },
                              label = { Text("Trash") }
                          )
                      }
                  }
              ) { padding ->
                  Box(modifier = Modifier.padding(padding)) {
                      when (vm.screen) {
                          Screen.HOME -> HomeScreen(vm)
                          Screen.EDITOR -> EditorScreen(vm)
                          Screen.TRASH -> NotesListScreen(vm, title = "Trash")
                          Screen.ARCHIVE -> NotesListScreen(vm, title = "Archive")
                          Screen.SETTINGS -> SettingsScreen(vm)
                      }
                  }
              }
          }

          @Composable
          fun HomeScreen(vm: NotesViewModel) {
              Column(
                  modifier = Modifier
                      .fillMaxSize()
                      .padding(16.dp),
                  verticalArrangement = Arrangement.spacedBy(16.dp)
              ) {
                  Dashboard(vm)

                  OutlinedTextField(
                      value = vm.query,
                      onValueChange = vm::updateQuery,
                      modifier = Modifier.fillMaxWidth(),
                      leadingIcon = { Icon(Icons.Default.Search, contentDescription = null) },
                      label = { Text("Search notes, folders, or tags") },
                      singleLine = true
                  )

                  NotesListContent(vm, vm.filteredNotes)
              }
          }

          @Composable
          fun Dashboard(vm: NotesViewModel) {
              Row(
                  modifier = Modifier.fillMaxWidth(),
                  horizontalArrangement = Arrangement.spacedBy(12.dp)
              ) {
                  StatCard("Notes", vm.activeNotes.size.toString(), Modifier.weight(1f))
                  StatCard("Pinned", vm.activeNotes.count { it.pinned }.toString(), Modifier.weight(1f))
                  StatCard("Stars", vm.activeNotes.count { it.favorite }.toString(), Modifier.weight(1f))
              }
          }

          @Composable
          fun StatCard(label: String, value: String, modifier: Modifier = Modifier) {
              Card(
                  modifier = modifier,
                  shape = RoundedCornerShape(22.dp)
              ) {
                  Column(modifier = Modifier.padding(16.dp)) {
                      Text(value, style = MaterialTheme.typography.headlineMedium, fontWeight = FontWeight.Bold)
                      Text(label, style = MaterialTheme.typography.labelLarge)
                  }
              }
          }

          @Composable
          fun NotesListScreen(vm: NotesViewModel, title: String) {
              Column(
                  modifier = Modifier
                      .fillMaxSize()
                      .padding(16.dp),
                  verticalArrangement = Arrangement.spacedBy(16.dp)
              ) {
                  Text(title, style = MaterialTheme.typography.headlineMedium, fontWeight = FontWeight.Bold)
                  NotesListContent(vm, vm.filteredNotes)
              }
          }

          @Composable
          fun NotesListContent(vm: NotesViewModel, list: List<Note>) {
              if (list.isEmpty()) {
                  EmptyState()
              } else {
                  LazyColumn(verticalArrangement = Arrangement.spacedBy(12.dp)) {
                      val sorted = list.sortedWith(compareByDescending<Note> { it.pinned }.thenByDescending { it.updatedAt })
                      items(sorted, key = { it.id }) { note ->
                          NoteCard(vm, note)
                      }
                  }
              }
          }

          @Composable
          fun NoteCard(vm: NotesViewModel, note: Note) {
              Card(
                  modifier = Modifier.fillMaxWidth(),
                  shape = RoundedCornerShape(24.dp),
                  onClick = { vm.edit(note) }
              ) {
                  Column(
                      modifier = Modifier.padding(18.dp),
                      verticalArrangement = Arrangement.spacedBy(10.dp)
                  ) {
                      Row(verticalAlignment = Alignment.CenterVertically) {
                          Column(modifier = Modifier.weight(1f)) {
                              Text(note.title, style = MaterialTheme.typography.titleLarge, fontWeight = FontWeight.Bold)
                              Text(note.updatedAt, style = MaterialTheme.typography.labelSmall)
                          }

                          if (note.pinned) {
                              Icon(Icons.Default.PushPin, contentDescription = null)
                          }
                      }

                      Text(note.body, style = MaterialTheme.typography.bodyMedium)

                      Row(horizontalArrangement = Arrangement.spacedBy(8.dp)) {
                          AssistChip(onClick = {}, label = { Text(note.folder) })
                          AssistChip(onClick = {}, label = { Text("#${'$'}{note.tag}") })
                      }

                      Row(horizontalArrangement = Arrangement.spacedBy(4.dp)) {
                          IconButton(onClick = { vm.togglePin(note) }) {
                              Icon(Icons.Default.PushPin, contentDescription = "Pin")
                          }

                          IconButton(onClick = { vm.toggleFavorite(note) }) {
                              Icon(
                                  if (note.favorite) Icons.Default.Star else Icons.Default.StarBorder,
                                  contentDescription = "Favorite"
                              )
                          }

                          IconButton(onClick = { vm.duplicate(note) }) {
                              Icon(Icons.Default.ContentCopy, contentDescription = "Duplicate")
                          }

                          if (note.trashed || note.archived) {
                              IconButton(onClick = { vm.restore(note) }) {
                                  Icon(Icons.Default.Restore, contentDescription = "Restore")
                              }
                          } else {
                              IconButton(onClick = { vm.archive(note) }) {
                                  Icon(Icons.Default.Archive, contentDescription = "Archive")
                              }
                              IconButton(onClick = { vm.moveToTrash(note) }) {
                                  Icon(Icons.Default.Delete, contentDescription = "Trash")
                              }
                          }

                          if (note.trashed) {
                              IconButton(onClick = { vm.deleteForever(note) }) {
                                  Icon(Icons.Default.DeleteForever, contentDescription = "Delete forever")
                              }
                          }
                      }
                  }
              }
          }

          @Composable
          fun EditorScreen(vm: NotesViewModel) {
              val editing = vm.selectedNote

              var title by remember(editing?.id) { mutableStateOf(editing?.title ?: "") }
              var body by remember(editing?.id) { mutableStateOf(editing?.body ?: "") }
              var folder by remember(editing?.id) { mutableStateOf(editing?.folder ?: "Personal") }
              var tag by remember(editing?.id) { mutableStateOf(editing?.tag ?: "General") }

              Column(
                  modifier = Modifier
                      .fillMaxSize()
                      .padding(16.dp),
                  verticalArrangement = Arrangement.spacedBy(14.dp)
              ) {
                  Text(
                      if (editing == null) "New Note" else "Edit Note",
                      style = MaterialTheme.typography.headlineMedium,
                      fontWeight = FontWeight.Bold
                  )

                  OutlinedTextField(
                      value = title,
                      onValueChange = { title = it },
                      modifier = Modifier.fillMaxWidth(),
                      label = { Text("Title") },
                      singleLine = true
                  )

                  OutlinedTextField(
                      value = folder,
                      onValueChange = { folder = it },
                      modifier = Modifier.fillMaxWidth(),
                      label = { Text("Folder") },
                      singleLine = true
                  )

                  OutlinedTextField(
                      value = tag,
                      onValueChange = { tag = it },
                      modifier = Modifier.fillMaxWidth(),
                      label = { Text("Tag") },
                      singleLine = true
                  )

                  OutlinedTextField(
                      value = body,
                      onValueChange = { body = it },
                      modifier = Modifier
                          .fillMaxWidth()
                          .weight(1f),
                      label = { Text("Body") }
                  )

                  Button(
                      onClick = { vm.save(title, body, folder, tag) },
                      modifier = Modifier.fillMaxWidth()
                  ) {
                      Text("Save Note")
                  }
              }
          }

          @Composable
          fun SettingsScreen(vm: NotesViewModel) {
              Column(
                  modifier = Modifier
                      .fillMaxSize()
                      .padding(20.dp),
                  verticalArrangement = Arrangement.spacedBy(16.dp)
              ) {
                  Text("Settings", style = MaterialTheme.typography.headlineMedium, fontWeight = FontWeight.Bold)

                  Card(shape = RoundedCornerShape(24.dp)) {
                      Column(
                          modifier = Modifier.padding(18.dp),
                          verticalArrangement = Arrangement.spacedBy(10.dp)
                      ) {
                          Text("Offline-first", fontWeight = FontWeight.Bold)
                          Text("This version stores notes in memory. It is stable, fast, and build-ready.")
                      }
                  }

                  Card(shape = RoundedCornerShape(24.dp)) {
                      Column(
                          modifier = Modifier.padding(18.dp),
                          verticalArrangement = Arrangement.spacedBy(10.dp)
                      ) {
                          Text("Tech Stack", fontWeight = FontWeight.Bold)
                          Text("Kotlin, Jetpack Compose, Material 3, MVVM, Java 17, Android SDK 36.")
                      }
                  }

                  Button(onClick = { vm.navigate(Screen.HOME) }, modifier = Modifier.fillMaxWidth()) {
                      Text("Back Home")
                  }
              }
          }

          @Composable
          fun EmptyState() {
              Box(
                  modifier = Modifier.fillMaxSize(),
                  contentAlignment = Alignment.Center
              ) {
                  Column(
                      horizontalAlignment = Alignment.CenterHorizontally,
                      verticalArrangement = Arrangement.spacedBy(12.dp)
                  ) {
                      Icon(Icons.Default.NoteAlt, contentDescription = null, modifier = Modifier.size(56.dp))
                      Text("No notes here", style = MaterialTheme.typography.titleLarge, fontWeight = FontWeight.Bold)
                      Text("Create, restore, or search notes to see them here.")
                  }
              }
          }
          EOF

      - name: Create Gradle wrapper
        run: |
          gradle wrapper --gradle-version 8.10.2
          chmod +x ./gradlew

      - name: Build APK
        run: |
          ./gradlew clean assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: stable-notes-app-apk
          path: |
            **/build/outputs/apk/debug/*.apk

      - name: Commit generated app
        if: always()
        run: |
          git config user.name "Stable Notes App Builder"
          git config user.email "actions@github.com"

          git add .
          git commit -m "Generate stable Kotlin Notes app" || echo "No changes to commit"
          git push || echo "Push skipped"
