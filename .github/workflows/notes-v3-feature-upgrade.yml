          PY

      - name: Verify release keystore exists
        run: |
          if [ ! -f app/signing/notes-release.jks ]; then
            mkdir -p app/signing
            keytool -genkeypair \
              -v \
              -keystore app/signing/notes-release.jks \
              -storepass notespassword \
              -alias noteskey \
              -keypass notespassword \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Notes,O=Notes App,C=US"
          fi

      - name: Ensure Gradle wrapper
        run: |
          if [ ! -f ./gradlew ]; then
            gradle wrapper --gradle-version 8.7
          fi
          chmod +x ./gradlew

      - name: Build debug APK
        run: |
          set -o pipefail
          ./gradlew clean assembleDebug --stacktrace --info 2>&1 | tee build-logs/v3-debug-build.log

      - name: Build signed release APK
        run: |
          set -o pipefail
          ./gradlew assembleRelease --stacktrace --info 2>&1 | tee build-logs/v3-release-apk-build.log

      - name: Build signed release AAB
        run: |
          set -o pipefail
          ./gradlew bundleRelease --stacktrace --info 2>&1 | tee build-logs/v3-release-aab-build.log

      - name: Generate V3 build report
        if: always()
        run: |
          cat > BUILD_REPORT.md <<EOF
          # Notes V3 Build Report

          Version Code: ${{ github.event.inputs.version_code }}
          Version Name: ${{ github.event.inputs.version_name }}

          ## V3 Features
          - Labels
          - Search
          - Material theme presets
          - Dark/light theme
          - Export/import backup
          - List/grid view
          - Formatting helpers
          - Lock screen
          - Note color labels
          - Pinned/favorite/archive/trash
          - Settings/about pages
          - Persistent offline JSON storage

          ## Note
          NotesMaster 3.0.4 is GPL-3.0 licensed. This V3 rebuild implements the same feature ideas natively instead of directly merging the original Java/WebView source.
          EOF

      - name: Upload debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notes-v3-debug-apk
          path: |
            **/build/outputs/apk/debug/*.apk

      - name: Upload signed release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notes-v3-signed-release-apk
          path: |
            **/build/outputs/apk/release/*.apk

      - name: Upload signed release AAB
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notes-v3-signed-release-aab
          path: |
            **/build/outputs/bundle/release/*.aab

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notes-v3-build-logs
          path: |
            build-logs/
            BUILD_REPORT.md
            **/build/reports/
            **/outputs/logs/

      - name: Commit Notes V3 upgrade
        if: always()
        run: |
          git config user.name "Notes V3 Feature Upgrade"
          git config user.email "actions@github.com"

          git add .
          git commit -m "Upgrade Notes app to V3 feature set" || echo "No changes to commit"
          git push || echo "Push skipped"
