name: Notes V3 Feature Upgrade

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: "Android versionCode"
        required: true
        default: "3"
        type: string
      version_name:
        description: "Android versionName"
        required: true
        default: "3.0.0"
        type: string

permissions:
  contents: write

jobs:
  v3:
    name: Upgrade Notes to V3 and Build
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      ANDROID_HOME: /opt/android-sdk
      ANDROID_SDK_ROOT: /opt/android-sdk
      ANDROID_USER_HOME: /home/runner/.android
      GRADLE_USER_HOME: /home/runner/.gradle
      JAVA_TOOL_OPTIONS: -Duser.home=/home/runner

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare environment
        run: |
          mkdir -p "$ANDROID_USER_HOME" "$GRADLE_USER_HOME" build-logs app/signing
          chmod -R 777 "$ANDROID_USER_HOME" "$GRADLE_USER_HOME"

      - name: Install packages
        run: |
          sudo apt update
          sudo apt install -y curl wget unzip zip git openjdk-17-jdk gradle python3

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android SDK
        run: |
          sudo mkdir -p "$ANDROID_HOME/cmdline-tools"
          cd /tmp

          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip

          sudo rm -rf "$ANDROID_HOME/cmdline-tools/latest"
          sudo mv cmdline-tools "$ANDROID_HOME/cmdline-tools/latest"

          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$ANDROID_HOME/platform-tools" >> "$GITHUB_PATH"

          yes | sudo "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true

          sudo "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Apply Notes V3 source-inspired features
        env:
          VERSION_CODE: ${{ github.event.inputs.version_code }}
          VERSION_NAME: ${{ github.event.inputs.version_name }}
        run: |
          python3 <<'PY'
          from pathlib import Path
          import os

          version_code = os.environ["VERSION_CODE"]
          version_name = os.environ["VERSION_NAME"]

          base = Path("app/src/main/java/com/notes/app")

          def write(path, content):
              p = Path(path)
              p.parent.mkdir(parents=True, exist_ok=True)
              p.write_text(content.strip() + "\n")

          write("settings.gradle.kts", """
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = "Notes"
          include(":app")
          """)

          write("build.gradle.kts", """
          plugins {
              id("com.android.application") version "8.3.2" apply false
              id("org.jetbrains.kotlin.android") version "1.9.22" apply false
          }
          """)

          write("gradle.properties", """
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
          kotlin.code.style=official
          """)

          write("app/build.gradle.kts", f"""
          plugins {{
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }}

          android {{
              namespace = "com.notes.app"
              compileSdk = 34

              defaultConfig {{
                  applicationId = "com.notes.app"
                  minSdk = 26
                  targetSdk = 34
                  versionCode = {version_code}
                  versionName = "{version_name}"
              }}

              signingConfigs {{
                  create("release") {{
                      storeFile = file("signing/notes-release.jks")
                      storePassword = "notespassword"
                      keyAlias = "noteskey"
                      keyPassword = "notespassword"
                  }}
              }}

              buildTypes {{
                  debug {{
                      applicationIdSuffix = ".debug"
                      versionNameSuffix = "-debug"
                  }}

                  release {{
                      isMinifyEnabled = false
                      isShrinkResources = false
                      signingConfig = signingConfigs.getByName("release")
                  }}
              }}

              buildFeatures {{
                  compose = true
              }}

              composeOptions {{
                  kotlinCompilerExtensionVersion = "1.5.10"
              }}

              compileOptions {{
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }}

              kotlinOptions {{
                  jvmTarget = "17"
              }}
          }}

          dependencies {{
              implementation("androidx.core:core-ktx:1.12.0")
              implementation("androidx.activity:activity-compose:1.8.2")
              implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.7.0")
              implementation("androidx.lifecycle:lifecycle-viewmodel-compose:2.7.0")

              implementation(platform("androidx.compose:compose-bom:2024.02.01"))
              implementation("androidx.compose.ui:ui")
              implementation("androidx.compose.ui:ui-tooling-preview")
              implementation("androidx.compose.foundation:foundation")
              implementation("androidx.compose.material3:material3")
              implementation("androidx.compose.material:material-icons-extended")

              debugImplementation("androidx.compose.ui:ui-tooling")
          }}
          """)

          write("app/src/main/AndroidManifest.xml", """
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="true"
                  android:label="Notes"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          """)

          write("app/src/main/res/values/styles.xml", """
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar"/>
          </resources>
          """)

          write("app/src/main/res/values-night/styles.xml", """
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.NoActionBar"/>
          </resources>
          """)

          write(base / "MainActivity.kt", """
          package com.notes.app

          import android.os.Bundle
          import androidx.activity.ComponentActivity
          import androidx.activity.compose.setContent
          import androidx.lifecycle.viewmodel.compose.viewModel
          import com.notes.app.ui.NotesApp
          import com.notes.app.ui.theme.NotesTheme

          class MainActivity : ComponentActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContent {
                      val vm: NotesViewModel = viewModel()
                      NotesTheme(themeName = vm.themeName, darkTheme = vm.darkTheme) {
                          NotesApp(vm = vm)
                      }
                  }
              }
          }
          """)

          write(base / "Note.kt", """
          package com.notes.app

          import java.text.SimpleDateFormat
          import java.util.Date
          import java.util.Locale
          import java.util.UUID

          data class Note(
              val id: String = UUID.randomUUID().toString(),
              val title: String,
              val body: String,
              val label: String = "Personal",
              val tags: String = "General",
              val color: Long = 0xFF8EA7FF,
              val pinned: Boolean = false,
              val favorite: Boolean = false,
              val archived: Boolean = false,
              val trashed: Boolean = false,
              val locked: Boolean = false,
              val updatedAt: String = now()
          )

          fun now(): String {
              return SimpleDateFormat("dd MMM yyyy, HH:mm", Locale.getDefault()).format(Date())
          }

          enum class Screen {
              LOCK, ONBOARDING, HOME, EDITOR, LABELS, FAVORITES, ARCHIVE, TRASH, SETTINGS, EXPORT_IMPORT, ABOUT
          }

          enum class ViewMode {
              LIST, GRID
          }

          enum class SortMode {
              UPDATED, TITLE, LABEL
          }
          """)

          write(base / "NotesStore.kt", """
          package com.notes.app

          import android.content.Context
          import org.json.JSONArray
          import org.json.JSONObject
          import java.io.File
          import java.util.UUID

          class NotesStore(context: Context) {
              private val notesFile = File(context.filesDir, "notes-v3.json")
              private val exportFile = File(context.filesDir, "notes-export.json")
              private val prefs = context.getSharedPreferences("notes_v3_settings", Context.MODE_PRIVATE)

              fun hasCompletedOnboarding(): Boolean {
                  return prefs.getBoolean("onboarding_done", false)
              }

              fun setOnboardingDone() {
                  prefs.edit().putBoolean("onboarding_done", true).apply()
              }

              fun isDarkTheme(): Boolean {
                  return prefs.getBoolean("dark_theme", true)
              }

              fun setDarkTheme(value: Boolean) {
                  prefs.edit().putBoolean("dark_theme", value).apply()
              }

              fun themeName(): String {
                  return prefs.getString("theme_name", "Indigo") ?: "Indigo"
              }

              fun setThemeName(value: String) {
                  prefs.edit().putString("theme_name", value).apply()
              }

              fun viewMode(): ViewMode {
                  return if (prefs.getString("view_mode", "LIST") == "GRID") ViewMode.GRID else ViewMode.LIST
              }

              fun setViewMode(value: ViewMode) {
                  prefs.edit().putString("view_mode", value.name).apply()
              }

              fun sortMode(): SortMode {
                  return when (prefs.getString("sort_mode", "UPDATED")) {
                      "TITLE" -> SortMode.TITLE
                      "LABEL" -> SortMode.LABEL
                      else -> SortMode.UPDATED
                  }
              }

              fun setSortMode(value: SortMode) {
                  prefs.edit().putString("sort_mode", value.name).apply()
              }

              fun appLockEnabled(): Boolean {
                  return prefs.getBoolean("lock_enabled", false)
              }

              fun setAppLockEnabled(value: Boolean) {
                  prefs.edit().putBoolean("lock_enabled", value).apply()
              }

              fun lockPin(): String {
                  return prefs.getString("lock_pin", "1234") ?: "1234"
              }

              fun setLockPin(value: String) {
                  prefs.edit().putString("lock_pin", value).apply()
              }

              fun loadNotes(): List<Note> {
                  return try {
                      if (!notesFile.exists()) return emptyList()
                      decodeNotes(notesFile.readText())
                  } catch (_: Exception) {
                      emptyList()
                  }
              }

              fun saveNotes(notes: List<Note>) {
                  notesFile.writeText(encodeNotes(notes))
              }

              fun exportNotes(notes: List<Note>): String {
                  val data = encodeNotes(notes)
                  exportFile.writeText(data)
                  return exportFile.absolutePath
              }

              fun importFromLastExport(): List<Note> {
                  return try {
                      if (!exportFile.exists()) emptyList() else decodeNotes(exportFile.readText())
                  } catch (_: Exception) {
                      emptyList()
                  }
              }

              private fun encodeNotes(notes: List<Note>): String {
                  val array = JSONArray()
                  notes.forEach { note ->
                      array.put(
                          JSONObject().apply {
                              put("id", note.id)
                              put("title", note.title)
                              put("body", note.body)
                              put("label", note.label)
                              put("tags", note.tags)
                              put("color", note.color)
                              put("pinned", note.pinned)
                              put("favorite", note.favorite)
                              put("archived", note.archived)
                              put("trashed", note.trashed)
                              put("locked", note.locked)
                              put("updatedAt", note.updatedAt)
                          }
                      )
                  }
                  return array.toString(2)
              }

              private fun decodeNotes(raw: String): List<Note> {
                  val array = JSONArray(raw)

                  return List(array.length()) { index ->
                      val item = array.getJSONObject(index)
                      Note(
                          id = item.optString("id", UUID.randomUUID().toString()),
                          title = item.optString("title", "Untitled Note"),
                          body = item.optString("body", ""),
                          label = item.optString("label", item.optString("folder", "Personal")),
                          tags = item.optString("tags", item.optString("tag", "General")),
                          color = item.optLong("color", 0xFF8EA7FF),
                          pinned = item.optBoolean("pinned", false),
                          favorite = item.optBoolean("favorite", false),
                          archived = item.optBoolean("archived", false),
                          trashed = item.optBoolean("trashed", false),
                          locked = item.optBoolean("locked", false),
                          updatedAt = item.optString("updatedAt", now())
                      )
                  }
              }
          }
          """)

          write(base / "NotesViewModel.kt", """
          package com.notes.app

          import android.app.Application
          import androidx.compose.runtime.getValue
          import androidx.compose.runtime.mutableStateOf
          import androidx.compose.runtime.setValue
          import androidx.lifecycle.AndroidViewModel
          import java.util.UUID

          class NotesViewModel(application: Application) : AndroidViewModel(application) {
              private val store = NotesStore(application)

              var unlocked by mutableStateOf(!store.appLockEnabled())
                  private set

              var screen by mutableStateOf(
                  if (store.appLockEnabled()) Screen.LOCK else if (store.hasCompletedOnboarding()) Screen.HOME else Screen.ONBOARDING
              )
                  private set

              var selectedNote by mutableStateOf<Note?>(null)
                  private set

              var query by mutableStateOf("")
                  private set

              var selectedLabel by mutableStateOf("All")
                  private set

              var darkTheme by mutableStateOf(store.isDarkTheme())
                  private set

              var themeName by mutableStateOf(store.themeName())
                  private set

              var viewMode by mutableStateOf(store.viewMode())
                  private set

              var sortMode by mutableStateOf(store.sortMode())
                  private set

              var showDeleteDialog by mutableStateOf<Note?>(null)
                  private set

              var exportMessage by mutableStateOf("")
                  private set

              var notes by mutableStateOf(loadInitialNotes())
                  private set

              private fun loadInitialNotes(): List<Note> {
                  val saved = store.loadNotes()
                  return saved.ifEmpty {
                      listOf(
                          Note(
                              title = "Welcome to Notes V3",
                              body = "V3 adds labels, lock screen, formatting helpers, import/export, view modes, sort modes, and material themes.",
                              label = "Inbox",
                              tags = "Start, V3",
                              pinned = true
                          ),
                          Note(
                              title = "Formatting toolbar",
                              body = "Use the editor buttons to insert bold, italic, underline, headings, quotes, links, bullets, numbered lists, dividers, and highlights.",
                              label = "Writing",
                              tags = "Editor",
                              favorite = true
                          )
                      )
                  }
              }

              private fun persist() {
                  store.saveNotes(notes)
              }

              val labels: List<String>
                  get() = listOf("All") + notes
                      .filter { !it.trashed && !it.archived }
                      .map { it.label.ifBlank { "Personal" } }
                      .distinct()
                      .sorted()

              val activeNotes: List<Note>
                  get() = notes.filter { !it.trashed && !it.archived }

              val pinnedNotes: List<Note>
                  get() = activeNotes.filter { it.pinned }

              val filteredNotes: List<Note>
                  get() {
                      val base = when (screen) {
                          Screen.TRASH -> notes.filter { it.trashed }
                          Screen.ARCHIVE -> notes.filter { it.archived && !it.trashed }
                          Screen.FAVORITES -> activeNotes.filter { it.favorite }
                          else -> activeNotes
                      }.let { list ->
                          if (selectedLabel == "All") list else list.filter { it.label == selectedLabel }
                      }

                      val searched = if (query.isBlank()) {
                          base
                      } else {
                          base.filter {
                              it.title.contains(query, true) ||
                                  it.body.contains(query, true) ||
                                  it.label.contains(query, true) ||
                                  it.tags.contains(query, true)
                          }
                      }

                      return when (sortMode) {
                          SortMode.TITLE -> searched.sortedBy { it.title.lowercase() }
                          SortMode.LABEL -> searched.sortedBy { it.label.lowercase() }
                          SortMode.UPDATED -> searched.sortedWith(compareByDescending<Note> { it.pinned }.thenByDescending { it.updatedAt })
                      }
                  }

              fun unlock(pin: String): Boolean {
                  val ok = pin == store.lockPin()
                  if (ok) {
                      unlocked = true
                      screen = if (store.hasCompletedOnboarding()) Screen.HOME else Screen.ONBOARDING
                  }
                  return ok
              }

              fun finishOnboarding() {
                  store.setOnboardingDone()
                  screen = Screen.HOME
              }

              fun navigate(target: Screen) {
                  screen = target
                  if (target != Screen.EDITOR) selectedNote = null
              }

              fun updateQuery(value: String) {
                  query = value
              }

              fun selectLabel(value: String) {
                  selectedLabel = value
              }

              fun toggleTheme() {
                  darkTheme = !darkTheme
                  store.setDarkTheme(darkTheme)
              }

              fun setTheme(value: String) {
                  themeName = value
                  store.setThemeName(value)
              }

              fun toggleViewMode() {
                  viewMode = if (viewMode == ViewMode.LIST) ViewMode.GRID else ViewMode.LIST
                  store.setViewMode(viewMode)
              }

              fun setSort(value: SortMode) {
                  sortMode = value
                  store.setSortMode(value)
              }

              fun setLock(enabled: Boolean, pin: String) {
                  store.setAppLockEnabled(enabled)
                  if (pin.length >= 4) store.setLockPin(pin)
              }

              fun newNote() {
                  selectedNote = null
                  screen = Screen.EDITOR
              }

              fun edit(note: Note) {
                  selectedNote = note
                  screen = Screen.EDITOR
              }

              fun cancelEdit() {
                  selectedNote = null
                  screen = Screen.HOME
              }

              fun save(title: String, body: String, label: String, tags: String, color: Long, locked: Boolean) {
                  val cleanTitle = title.ifBlank { "Untitled Note" }
                  val cleanBody = body.ifBlank { "No content" }
                  val cleanLabel = label.ifBlank { "Personal" }
                  val cleanTags = tags.ifBlank { "General" }
                  val existing = selectedNote

                  notes = if (existing == null) {
                      listOf(
                          Note(
                              title = cleanTitle,
                              body = cleanBody,
                              label = cleanLabel,
                              tags = cleanTags,
                              color = color,
                              locked = locked
                          )
                      ) + notes
                  } else {
                      notes.map {
                          if (it.id == existing.id) {
                              it.copy(
                                  title = cleanTitle,
                                  body = cleanBody,
                                  label = cleanLabel,
                                  tags = cleanTags,
                                  color = color,
                                  locked = locked,
                                  updatedAt = now()
                              )
                          } else {
                              it
                          }
                      }
                  }

                  selectedNote = null
                  screen = Screen.HOME
                  persist()
              }

              fun togglePin(note: Note) {
                  notes = notes.map { if (it.id == note.id) it.copy(pinned = !it.pinned, updatedAt = now()) else it }
                  persist()
              }

              fun toggleFavorite(note: Note) {
                  notes = notes.map { if (it.id == note.id) it.copy(favorite = !it.favorite, updatedAt = now()) else it }
                  persist()
              }

              fun duplicate(note: Note) {
                  notes = listOf(note.copy(id = UUID.randomUUID().toString(), title = note.title + " Copy", updatedAt = now())) + notes
                  persist()
              }

              fun archive(note: Note) {
                  notes = notes.map { if (it.id == note.id) it.copy(archived = true, trashed = false, updatedAt = now()) else it }
                  persist()
              }

              fun requestDelete(note: Note) {
                  showDeleteDialog = note
              }

              fun dismissDeleteDialog() {
                  showDeleteDialog = null
              }

              fun moveToTrashConfirmed() {
                  val note = showDeleteDialog ?: return
                  notes = notes.map { if (it.id == note.id) it.copy(trashed = true, archived = false, updatedAt = now()) else it }
                  showDeleteDialog = null
                  persist()
              }

              fun restore(note: Note) {
                  notes = notes.map { if (it.id == note.id) it.copy(trashed = false, archived = false, updatedAt = now()) else it }
                  persist()
              }

              fun deleteForever(note: Note) {
                  notes = notes.filterNot { it.id == note.id }
                  persist()
              }

              fun exportNotes() {
                  exportMessage = "Exported to: " + store.exportNotes(notes)
              }

              fun importLastExport() {
                  val imported = store.importFromLastExport()
                  if (imported.isNotEmpty()) {
                      notes = imported
                      persist()
                      exportMessage = "Imported ${imported.size} notes from last export."
                  } else {
                      exportMessage = "No export file found yet."
                  }
              }
          }
          """)

          write(base / "ui/theme/Theme.kt", """
          package com.notes.app.ui.theme

          import androidx.compose.material3.MaterialTheme
          import androidx.compose.material3.darkColorScheme
          import androidx.compose.material3.lightColorScheme
          import androidx.compose.runtime.Composable
          import androidx.compose.ui.graphics.Color

          private fun darkScheme(themeName: String) = when (themeName) {
              "Emerald" -> darkColorScheme(primary = Color(0xFF7BE4B2), secondary = Color(0xFFA8F0CF), background = Color(0xFF06110D), surface = Color(0xFF101C17))
              "Sunset" -> darkColorScheme(primary = Color(0xFFFFB26B), secondary = Color(0xFFFFD0A3), background = Color(0xFF120B08), surface = Color(0xFF211713))
              "Rose" -> darkColorScheme(primary = Color(0xFFFF9BCB), secondary = Color(0xFFFFC1DC), background = Color(0xFF14070F), surface = Color(0xFF22101A))
              else -> darkColorScheme(primary = Color(0xFF9DB4FF), secondary = Color(0xFFC6D2FF), background = Color(0xFF090B10), surface = Color(0xFF121722))
          }

          private fun lightScheme(themeName: String) = when (themeName) {
              "Emerald" -> lightColorScheme(primary = Color(0xFF007A4D), secondary = Color(0xFF276B50), background = Color(0xFFF3FCF7), surface = Color.White)
              "Sunset" -> lightColorScheme(primary = Color(0xFFB75B00), secondary = Color(0xFF8F5C2D), background = Color(0xFFFFF7F0), surface = Color.White)
              "Rose" -> lightColorScheme(primary = Color(0xFFC02769), secondary = Color(0xFF8F4B68), background = Color(0xFFFFF5FA), surface = Color.White)
              else -> lightColorScheme(primary = Color(0xFF3657D8), secondary = Color(0xFF5C6FAE), background = Color(0xFFF6F7FC), surface = Color.White)
          }

          @Composable
          fun NotesTheme(themeName: String, darkTheme: Boolean, content: @Composable () -> Unit) {
              MaterialTheme(
                  colorScheme = if (darkTheme) darkScheme(themeName) else lightScheme(themeName),
                  content = content
              )
          }
          """)

          write(base / "ui/NotesApp.kt", """
          package com.notes.app.ui

          import androidx.compose.foundation.layout.Box
          import androidx.compose.foundation.layout.Column
          import androidx.compose.foundation.layout.padding
          import androidx.compose.material.icons.Icons
          import androidx.compose.material.icons.filled.*
          import androidx.compose.material3.*
          import androidx.compose.runtime.Composable
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.text.font.FontWeight
          import com.notes.app.NotesViewModel
          import com.notes.app.Screen
          import com.notes.app.ui.screens.*

          @OptIn(ExperimentalMaterial3Api::class)
          @Composable
          fun NotesApp(vm: NotesViewModel) {
              when (vm.screen) {
                  Screen.LOCK -> {
                      LockScreen(vm)
                      return
                  }
                  Screen.ONBOARDING -> {
                      OnboardingScreen(vm)
                      return
                  }
                  else -> Unit
              }

              DeleteConfirmationDialog(vm)

              Scaffold(
                  topBar = {
                      LargeTopAppBar(
                          title = {
                              Column {
                                  Text("Notes V3", fontWeight = FontWeight.Bold)
                                  Text(
                                      text = "${vm.activeNotes.size} notes • ${vm.themeName} • ${vm.viewMode.name.lowercase()}",
                                      style = MaterialTheme.typography.labelLarge,
                                      color = MaterialTheme.colorScheme.onSurfaceVariant
                                  )
                              }
                          },
                          navigationIcon = {
                              if (vm.screen == Screen.EDITOR) {
                                  IconButton(onClick = { vm.cancelEdit() }) {
                                      Icon(Icons.Default.ArrowBack, contentDescription = "Back")
                                  }
                              }
                          },
                          actions = {
                              IconButton(onClick = { vm.toggleViewMode() }) {
                                  Icon(if (vm.viewMode.name == "GRID") Icons.Default.ViewList else Icons.Default.GridView, contentDescription = "View")
                              }
                              IconButton(onClick = { vm.toggleTheme() }) {
                                  Icon(if (vm.darkTheme) Icons.Default.LightMode else Icons.Default.DarkMode, contentDescription = "Theme")
                              }
                              IconButton(onClick = { vm.navigate(Screen.SETTINGS) }) {
                                  Icon(Icons.Default.Settings, contentDescription = "Settings")
                              }
                          }
                      )
                  },
                  floatingActionButton = {
                      if (vm.screen != Screen.EDITOR) {
                          ExtendedFloatingActionButton(
                              onClick = { vm.newNote() },
