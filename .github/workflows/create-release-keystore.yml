name: Create Notes Release Keystore

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-keystore:
    name: Create app/signing/notes-release.jks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Create release keystore file
        run: |
          set -e

          mkdir -p app/signing

          if [ -f app/signing/notes-release.jks ]; then
            echo "Keystore already exists:"
            ls -lh app/signing/notes-release.jks
            exit 0
          fi

          keytool -genkeypair \
            -v \
            -keystore app/signing/notes-release.jks \
            -storepass notespassword \
            -alias noteskey \
            -keypass notespassword \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Notes,O=Notes App,C=US"

          echo "Created keystore:"
          ls -lh app/signing/notes-release.jks

          keytool -list \
            -keystore app/signing/notes-release.jks \
            -storepass notespassword \
            -alias noteskey

      - name: Commit keystore
        run: |
          git config user.name "Notes Keystore Bot"
          git config user.email "actions@github.com"

          git add app/signing/notes-release.jks
          git commit -m "Add Notes release keystore" || echo "No changes to commit"
          git push || echo "Push skipped"

      - name: Upload keystore backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: notes-release-keystore-backup-save-this
          path: app/signing/notes-release.jks
