name: Notes Production Pipeline

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: "Android versionCode"
        required: true
        default: "1"
        type: string
      version_name:
        description: "Android versionName"
        required: true
        default: "1.0.0"
        type: string

permissions:
  contents: write

jobs:
  production:
    name: Build Notes Production APK/AAB
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      ANDROID_HOME: /opt/android-sdk
      ANDROID_SDK_ROOT: /opt/android-sdk
      ANDROID_USER_HOME: /home/runner/.android
      GRADLE_USER_HOME: /home/runner/.gradle
      JAVA_TOOL_OPTIONS: -Duser.home=/home/runner

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare environment
        run: |
          mkdir -p "$ANDROID_USER_HOME" "$GRADLE_USER_HOME" build-logs app/signing
          chmod -R 777 "$ANDROID_USER_HOME" "$GRADLE_USER_HOME"

      - name: Install packages
        run: |
          sudo apt update
          sudo apt install -y curl wget unzip zip git openjdk-17-jdk gradle python3

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android SDK
        run: |
          sudo mkdir -p "$ANDROID_HOME/cmdline-tools"
          cd /tmp

          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip

          sudo rm -rf "$ANDROID_HOME/cmdline-tools/latest"
          sudo mv cmdline-tools "$ANDROID_HOME/cmdline-tools/latest"

          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$ANDROID_HOME/platform-tools" >> "$GITHUB_PATH"

          yes | sudo "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true

          sudo "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Configure Gradle production files
        env:
          VERSION_CODE: ${{ github.event.inputs.version_code }}
          VERSION_NAME: ${{ github.event.inputs.version_name }}
        run: |
          cat > settings.gradle.kts <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = "Notes"
          include(":app")
          EOF

          cat > build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application") version "8.3.2" apply false
              id("org.jetbrains.kotlin.android") version "1.9.22" apply false
          }
          EOF

          cat > gradle.properties <<'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
          kotlin.code.style=official
          EOF

          cat > app/build.gradle.kts <<EOF
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }

          android {
              namespace = "com.notes.app"
              compileSdk = 34

              defaultConfig {
                  applicationId = "com.notes.app"
                  minSdk = 26
                  targetSdk = 34
                  versionCode = ${VERSION_CODE}
                  versionName = "${VERSION_NAME}"
              }

              signingConfigs {
                  create("release") {
                      storeFile = file("signing/notes-release.jks")
                      storePassword = "notespassword"
                      keyAlias = "noteskey"
                      keyPassword = "notespassword"
                  }
              }

              buildTypes {
                  debug {
                      applicationIdSuffix = ".debug"
                      versionNameSuffix = "-debug"
                  }

                  release {
                      isMinifyEnabled = false
                      isShrinkResources = false
                      signingConfig = signingConfigs.getByName("release")
                  }
              }

              buildFeatures {
                  compose = true
              }

              composeOptions {
                  kotlinCompilerExtensionVersion = "1.5.10"
              }

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = "17"
              }
          }

          dependencies {
              implementation("androidx.core:core-ktx:1.12.0")
              implementation("androidx.activity:activity-compose:1.8.2")
              implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.7.0")
              implementation("androidx.lifecycle:lifecycle-viewmodel-compose:2.7.0")

              implementation(platform("androidx.compose:compose-bom:2024.02.01"))
              implementation("androidx.compose.ui:ui")
              implementation("androidx.compose.ui:ui-tooling-preview")
              implementation("androidx.compose.foundation:foundation")
              implementation("androidx.compose.material3:material3")
              implementation("androidx.compose.material:material-icons-extended")

              debugImplementation("androidx.compose.ui:ui-tooling")
          }
          EOF

      - name: Verify release keystore exists
        run: |
          if [ ! -f app/signing/notes-release.jks ]; then
            echo "Release keystore missing. Creating a new one at app/signing/notes-release.jks"
            mkdir -p app/signing

            keytool -genkeypair \
              -v \
              -keystore app/signing/notes-release.jks \
              -storepass notespassword \
              -alias noteskey \
              -keypass notespassword \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Notes,O=Notes App,C=US"
          fi

          ls -lh app/signing/notes-release.jks

          keytool -list \
            -keystore app/signing/notes-release.jks \
            -storepass notespassword \
            -alias noteskey

      - name: Create debug keystore
        run: |
          mkdir -p "$ANDROID_USER_HOME"

          keytool -genkeypair \
            -v \
            -keystore "$ANDROID_USER_HOME/debug.keystore" \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" || true

      - name: Ensure Gradle wrapper
        run: |
          if [ ! -f ./gradlew ]; then
            gradle wrapper --gradle-version 8.7
          fi

          chmod +x ./gradlew

      - name: Build debug APK
        run: |
          set -o pipefail
          ./gradlew clean assembleDebug --stacktrace --info 2>&1 | tee build-logs/debug-build.log

      - name: Build signed release APK
        run: |
          set -o pipefail
          ./gradlew assembleRelease --stacktrace --info 2>&1 | tee build-logs/release-apk-build.log

      - name: Build signed release AAB
        run: |
          set -o pipefail
          ./gradlew bundleRelease --stacktrace --info 2>&1 | tee build-logs/release-aab-build.log

      - name: Generate build report
        if: always()
        run: |
          cat > BUILD_REPORT.md <<EOF
          # Notes Production Build Report

          App Name: Notes
          Package Name: com.notes.app
          Version Code: ${{ github.event.inputs.version_code }}
          Version Name: ${{ github.event.inputs.version_name }}

          ## Outputs
          - Debug APK
          - Signed Release APK
          - Signed Release AAB
          - Build logs
          - Release keystore backup

          ## Important
          Save the release keystore artifact safely. You need the same keystore for future app updates.
          EOF

      - name: Upload debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notes-debug-apk
          path: |
            **/build/outputs/apk/debug/*.apk

      - name: Upload signed release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notes-signed-release-apk
          path: |
            **/build/outputs/apk/release/*.apk

      - name: Upload signed release AAB
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notes-signed-release-aab
          path: |
            **/build/outputs/bundle/release/*.aab

      - name: Upload release keystore backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notes-release-keystore-save-this
          path: |
            app/signing/notes-release.jks

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notes-production-build-logs
          path: |
            build-logs/
            BUILD_REPORT.md
            **/build/reports/
            **/outputs/logs/

      - name: Commit production config
        if: always()
        run: |
          git config user.name "Notes Production Pipeline"
          git config user.email "actions@github.com"

          git add .
          git commit -m "Configure Notes production pipeline" || echo "No changes to commit"
          git push || echo "Push skipped"
