name: Fix Gradle Clean Production

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Rewrite clean build.gradle.kts
        run: |
          cat > app/build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }

          android {
              namespace = "com.notes.app"
              compileSdk = 36

              defaultConfig {
                  applicationId = "com.notes.app"
                  minSdk = 26
                  targetSdk = 36
                  versionCode = 1
                  versionName = "1.0"
              }

              signingConfigs {
                  create("release") {
                      storeFile = file("signing/notes-release.jks")
                      storePassword = "notespassword"
                      keyAlias = "noteskey"
                      keyPassword = "notespassword"
                  }
              }

              buildTypes {
                  debug {
                      applicationIdSuffix = ".debug"
                      versionNameSuffix = "-debug"
                  }

                  release {
                      isMinifyEnabled = false
                      isShrinkResources = false
                      signingConfig = signingConfigs.getByName("release")
                  }
              }

              buildFeatures {
                  compose = true
              }

              composeOptions {
                  kotlinCompilerExtensionVersion = "1.5.14"
              }

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = "17"
              }
          }

          dependencies {
              implementation("androidx.core:core-ktx:1.13.1")
              implementation("androidx.activity:activity-compose:1.9.2")
              implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.8.4")
              implementation("androidx.lifecycle:lifecycle-viewmodel-compose:2.8.4")

              implementation(platform("androidx.compose:compose-bom:2024.06.00"))
              implementation("androidx.compose.ui:ui")
              implementation("androidx.compose.ui:ui-tooling-preview")
              implementation("androidx.compose.foundation:foundation")
              implementation("androidx.compose.material3:material3")
              implementation("androidx.compose.material:material-icons-extended")

              debugImplementation("androidx.compose.ui:ui-tooling")
          }
          EOF

      - name: Ensure signing folder exists
        run: |
          mkdir -p app/signing
          touch app/signing/.gitkeep

      - name: Commit clean fix
        run: |
          git config user.name "Gradle Clean Fix"
          git config user.email "actions@github.com"

          git add .
          git commit -m "Reset build.gradle.kts to clean production config" || echo "No changes"
          git push || echo "Push skipped"
