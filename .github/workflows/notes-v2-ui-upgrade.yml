name: Notes V2 UI Upgrade

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: "Android versionCode"
        required: true
        default: "2"
        type: string
      version_name:
        description: "Android versionName"
        required: true
        default: "2.0.0"
        type: string

permissions:
  contents: write

jobs:
  v2-upgrade:
    name: Upgrade Notes V2 UI and Build
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      ANDROID_HOME: /opt/android-sdk
      ANDROID_SDK_ROOT: /opt/android-sdk
      ANDROID_USER_HOME: /home/runner/.android
      GRADLE_USER_HOME: /home/runner/.gradle
      JAVA_TOOL_OPTIONS: -Duser.home=/home/runner

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare environment
        run: |
          mkdir -p "$ANDROID_USER_HOME" "$GRADLE_USER_HOME" build-logs app/signing
          chmod -R 777 "$ANDROID_USER_HOME" "$GRADLE_USER_HOME"

      - name: Install packages
        run: |
          sudo apt update
          sudo apt install -y curl wget unzip zip git openjdk-17-jdk gradle python3

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android SDK
        run: |
          sudo mkdir -p "$ANDROID_HOME/cmdline-tools"
          cd /tmp

          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip

          sudo rm -rf "$ANDROID_HOME/cmdline-tools/latest"
          sudo mv cmdline-tools "$ANDROID_HOME/cmdline-tools/latest"

          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$ANDROID_HOME/platform-tools" >> "$GITHUB_PATH"

          yes | sudo "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true

          sudo "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Apply Notes V2 premium UI upgrade
        env:
          VERSION_CODE: ${{ github.event.inputs.version_code }}
          VERSION_NAME: ${{ github.event.inputs.version_name }}
        run: |
          python3 <<'PY'
          from pathlib import Path
          import os

          version_code = os.environ["VERSION_CODE"]
          version_name = os.environ["VERSION_NAME"]

          def write(path, content):
              p = Path(path)
              p.parent.mkdir(parents=True, exist_ok=True)
              p.write_text(content.strip() + "\n")

          base = "app/src/main/java/com/notes/app"

          write("settings.gradle.kts", """
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = "Notes"
          include(":app")
          """)

          write("build.gradle.kts", """
          plugins {
              id("com.android.application") version "8.3.2" apply false
              id("org.jetbrains.kotlin.android") version "1.9.22" apply false
          }
          """)

          write("gradle.properties", """
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
          kotlin.code.style=official
          """)

          write("app/build.gradle.kts", f"""
          plugins {{
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }}

          android {{
              namespace = "com.notes.app"
              compileSdk = 34

              defaultConfig {{
                  applicationId = "com.notes.app"
                  minSdk = 26
                  targetSdk = 34
                  versionCode = {version_code}
                  versionName = "{version_name}"
              }}

              signingConfigs {{
                  create("release") {{
                      storeFile = file("signing/notes-release.jks")
                      storePassword = "notespassword"
                      keyAlias = "noteskey"
                      keyPassword = "notespassword"
                  }}
              }}

              buildTypes {{
                  debug {{
                      applicationIdSuffix = ".debug"
                      versionNameSuffix = "-debug"
                  }}

                  release {{
                      isMinifyEnabled = false
                      isShrinkResources = false
                      signingConfig = signingConfigs.getByName("release")
                  }}
              }}

              buildFeatures {{
                  compose = true
              }}

              composeOptions {{
                  kotlinCompilerExtensionVersion = "1.5.10"
              }}

              compileOptions {{
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }}

              kotlinOptions {{
                  jvmTarget = "17"
              }}
          }}

          dependencies {{
              implementation("androidx.core:core-ktx:1.12.0")
              implementation("androidx.activity:activity-compose:1.8.2")
              implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.7.0")
              implementation("androidx.lifecycle:lifecycle-viewmodel-compose:2.7.0")

              implementation(platform("androidx.compose:compose-bom:2024.02.01"))
              implementation("androidx.compose.ui:ui")
              implementation("androidx.compose.ui:ui-tooling-preview")
              implementation("androidx.compose.foundation:foundation")
              implementation("androidx.compose.material3:material3")
              implementation("androidx.compose.material:material-icons-extended")

              debugImplementation("androidx.compose.ui:ui-tooling")
          }}
          """)

          write("app/src/main/AndroidManifest.xml", """
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="true"
                  android:label="Notes"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          """)

          write("app/src/main/res/values/styles.xml", """
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar"/>
          </resources>
          """)

          write("app/src/main/res/values-night/styles.xml", """
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.NoActionBar"/>
          </resources>
          """)

          write(f"{base}/ui/theme/Theme.kt", """
          package com.notes.app.ui.theme

          import androidx.compose.material3.MaterialTheme
          import androidx.compose.material3.darkColorScheme
          import androidx.compose.material3.lightColorScheme
          import androidx.compose.runtime.Composable
          import androidx.compose.ui.graphics.Color

          private val DarkColors = darkColorScheme(
              primary = Color(0xFF9DB4FF),
              secondary = Color(0xFFC6D2FF),
              tertiary = Color(0xFFFFC77D),
              background = Color(0xFF090B10),
              surface = Color(0xFF121722),
              surfaceVariant = Color(0xFF1B2230),
              onPrimary = Color(0xFF071025),
              onBackground = Color(0xFFF3F6FF),
              onSurface = Color(0xFFF3F6FF),
              onSurfaceVariant = Color(0xFFC7CDDB)
          )

          private val LightColors = lightColorScheme(
              primary = Color(0xFF3657D8),
              secondary = Color(0xFF5C6FAE),
              tertiary = Color(0xFF9B5C00),
              background = Color(0xFFF6F7FC),
              surface = Color(0xFFFFFFFF),
              surfaceVariant = Color(0xFFE9ECF6),
              onPrimary = Color.White,
              onBackground = Color(0xFF10131A),
              onSurface = Color(0xFF10131A),
              onSurfaceVariant = Color(0xFF4D5566)
          )

          @Composable
          fun NotesTheme(darkTheme: Boolean, content: @Composable () -> Unit) {
              MaterialTheme(
                  colorScheme = if (darkTheme) DarkColors else LightColors,
                  content = content
              )
          }
          """)

          write(f"{base}/ui/NotesApp.kt", """
          package com.notes.app.ui

          import androidx.compose.foundation.layout.Box
          import androidx.compose.foundation.layout.Column
          import androidx.compose.foundation.layout.padding
          import androidx.compose.material.icons.Icons
          import androidx.compose.material.icons.filled.*
          import androidx.compose.material3.*
          import androidx.compose.runtime.Composable
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.text.font.FontWeight
          import com.notes.app.NotesViewModel
          import com.notes.app.Screen
          import com.notes.app.ui.screens.*

          @OptIn(ExperimentalMaterial3Api::class)
          @Composable
          fun NotesApp(vm: NotesViewModel) {
              if (vm.screen == Screen.ONBOARDING) {
                  OnboardingScreen(vm)
                  return
              }

              DeleteConfirmationDialog(vm)

              Scaffold(
                  topBar = {
                      LargeTopAppBar(
                          title = {
                              Column {
                                  Text("Notes", fontWeight = FontWeight.Bold)
                                  Text(
                                      text = "V2 • ${vm.activeNotes.size} active notes",
                                      style = MaterialTheme.typography.labelLarge,
                                      color = MaterialTheme.colorScheme.onSurfaceVariant
                                  )
                              }
                          },
                          navigationIcon = {
                              if (vm.screen == Screen.EDITOR) {
                                  IconButton(onClick = { vm.cancelEdit() }) {
                                      Icon(Icons.Default.ArrowBack, contentDescription = "Back")
                                  }
                              }
                          },
                          actions = {
                              IconButton(onClick = { vm.toggleTheme() }) {
                                  Icon(
                                      if (vm.darkTheme) Icons.Default.LightMode else Icons.Default.DarkMode,
                                      contentDescription = "Theme"
                                  )
                              }
                              IconButton(onClick = { vm.navigate(Screen.SETTINGS) }) {
                                  Icon(Icons.Default.Settings, contentDescription = "Settings")
                              }
                          }
                      )
                  },
                  floatingActionButton = {
                      if (vm.screen != Screen.EDITOR) {
                          ExtendedFloatingActionButton(
                              onClick = { vm.newNote() },
                              icon = { Icon(Icons.Default.Add, contentDescription = "New note") },
                              text = { Text("New Note") }
                          )
                      }
                  },
                  bottomBar = {
                      if (vm.screen != Screen.EDITOR) {
                          NavigationBar {
                              NavigationBarItem(
                                  selected = vm.screen == Screen.HOME,
                                  onClick = { vm.navigate(Screen.HOME) },
                                  icon = { Icon(Icons.Default.Home, contentDescription = null) },
                                  label = { Text("Home") }
                              )
                              NavigationBarItem(
                                  selected = vm.screen == Screen.FAVORITES,
                                  onClick = { vm.navigate(Screen.FAVORITES) },
                                  icon = { Icon(Icons.Default.Star, contentDescription = null) },
                                  label = { Text("Stars") }
                              )
                              NavigationBarItem(
                                  selected = vm.screen == Screen.ARCHIVE,
                                  onClick = { vm.navigate(Screen.ARCHIVE) },
                                  icon = { Icon(Icons.Default.Archive, contentDescription = null) },
                                  label = { Text("Archive") }
                              )
                              NavigationBarItem(
                                  selected = vm.screen == Screen.TRASH,
                                  onClick = { vm.navigate(Screen.TRASH) },
                                  icon = { Icon(Icons.Default.Delete, contentDescription = null) },
                                  label = { Text("Trash") }
                              )
                          }
                      }
                  }
              ) { padding ->
                  Box(modifier = Modifier.padding(padding)) {
                      when (vm.screen) {
                          Screen.HOME -> HomeScreen(vm)
                          Screen.EDITOR -> EditorScreen(vm)
                          Screen.FAVORITES -> NotesListScreen(vm, "Favorites")
                          Screen.ARCHIVE -> NotesListScreen(vm, "Archive")
                          Screen.TRASH -> NotesListScreen(vm, "Trash")
                          Screen.SETTINGS -> SettingsScreen(vm)
                          Screen.ONBOARDING -> OnboardingScreen(vm)
                      }
                  }
              }
          }

          @Composable
          fun DeleteConfirmationDialog(vm: NotesViewModel) {
              val note = vm.showDeleteDialog ?: return

              AlertDialog(
                  onDismissRequest = { vm.dismissDeleteDialog() },
                  title = { Text("Move to Trash?") },
                  text = { Text("“${note.title}” will be moved to Trash. You can restore it later.") },
                  confirmButton = {
                      Button(onClick = { vm.moveToTrashConfirmed() }) {
                          Text("Move")
                      }
                  },
                  dismissButton = {
                      TextButton(onClick = { vm.dismissDeleteDialog() }) {
                          Text("Cancel")
                      }
                  }
              )
          }
          """)

          write(f"{base}/ui/screens/Common.kt", """
          package com.notes.app.ui.screens

          import androidx.compose.foundation.background
          import androidx.compose.foundation.layout.*
          import androidx.compose.foundation.lazy.LazyColumn
          import androidx.compose.foundation.lazy.LazyRow
          import androidx.compose.foundation.lazy.items
          import androidx.compose.foundation.shape.RoundedCornerShape
          import androidx.compose.material.icons.Icons
          import androidx.compose.material.icons.filled.*
          import androidx.compose.material3.*
          import androidx.compose.runtime.Composable
          import androidx.compose.ui.Alignment
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.draw.clip
          import androidx.compose.ui.text.font.FontWeight
          import androidx.compose.ui.text.style.TextOverflow
          import androidx.compose.ui.unit.dp
          import com.notes.app.Note
          import com.notes.app.NotesViewModel

          @Composable
          fun HeroDashboard(vm: NotesViewModel) {
              Card(
                  modifier = Modifier.fillMaxWidth(),
                  shape = RoundedCornerShape(32.dp),
                  colors = CardDefaults.cardColors(containerColor = MaterialTheme.colorScheme.primaryContainer)
              ) {
                  Column(
                      modifier = Modifier.padding(22.dp),
                      verticalArrangement = Arrangement.spacedBy(14.dp)
                  ) {
                      Text(
                          "Your thinking space",
                          style = MaterialTheme.typography.headlineSmall,
                          fontWeight = FontWeight.Bold
                      )
                      Text(
                          "Capture ideas, organize folders, pin priorities, and keep every note offline.",
                          style = MaterialTheme.typography.bodyMedium,
                          color = MaterialTheme.colorScheme.onSurfaceVariant
                      )

                      Row(horizontalArrangement = Arrangement.spacedBy(12.dp)) {
                          StatPill("Notes", vm.activeNotes.size.toString(), Modifier.weight(1f))
                          StatPill("Pinned", vm.pinnedNotes.size.toString(), Modifier.weight(1f))
                          StatPill("Stars", vm.activeNotes.count { it.favorite }.toString(), Modifier.weight(1f))
                      }
                  }
              }
          }

          @Composable
          fun StatPill(label: String, value: String, modifier: Modifier = Modifier) {
              Surface(
                  modifier = modifier,
                  shape = RoundedCornerShape(22.dp),
                  color = MaterialTheme.colorScheme.surface.copy(alpha = 0.78f)
              ) {
                  Column(modifier = Modifier.padding(14.dp)) {
                      Text(value, style = MaterialTheme.typography.titleLarge, fontWeight = FontWeight.Bold)
                      Text(label, style = MaterialTheme.typography.labelMedium)
                  }
              }
          }

          @Composable
          fun FolderFilters(vm: NotesViewModel) {
              LazyRow(horizontalArrangement = Arrangement.spacedBy(8.dp)) {
                  items(vm.folders) { folder ->
                      FilterChip(
                          selected = vm.selectedFolder == folder,
                          onClick = { vm.selectFolder(folder) },
                          label = { Text(folder) },
                          leadingIcon = {
                              if (vm.selectedFolder == folder) {
                                  Icon(Icons.Default.Check, contentDescription = null, modifier = Modifier.size(16.dp))
                              }
                          }
                      )
                  }
              }
          }

          @Composable
          fun NotesListContent(vm: NotesViewModel, list: List<Note>) {
              if (list.isEmpty()) {
                  EmptyState()
              } else {
                  LazyColumn(
                      verticalArrangement = Arrangement.spacedBy(14.dp),
                      contentPadding = PaddingValues(bottom = 96.dp)
                  ) {
                      val sorted = list.sortedWith(compareByDescending<Note> { it.pinned }.thenByDescending { it.updatedAt })
                      items(sorted, key = { it.id }) { note ->
                          NoteCard(vm, note)
                      }
                  }
              }
          }

          @Composable
          fun NoteCard(vm: NotesViewModel, note: Note) {
              ElevatedCard(
                  modifier = Modifier.fillMaxWidth(),
                  shape = RoundedCornerShape(28.dp),
                  onClick = { vm.edit(note) },
                  colors = CardDefaults.elevatedCardColors(containerColor = MaterialTheme.colorScheme.surface)
              ) {
                  Column(
                      modifier = Modifier.padding(18.dp),
                      verticalArrangement = Arrangement.spacedBy(12.dp)
                  ) {
                      Row(verticalAlignment = Alignment.CenterVertically) {
                          Column(modifier = Modifier.weight(1f)) {
                              Row(verticalAlignment = Alignment.CenterVertically) {
                                  if (note.pinned) {
                                      Icon(
                                          Icons.Default.PushPin,
                                          contentDescription = null,
                                          modifier = Modifier.size(18.dp),
                                          tint = MaterialTheme.colorScheme.primary
                                      )
                                      Spacer(Modifier.width(6.dp))
                                  }

                                  Text(
                                      note.title,
                                      style = MaterialTheme.typography.titleLarge,
                                      fontWeight = FontWeight.Bold,
                                      maxLines = 1,
                                      overflow = TextOverflow.Ellipsis
                                  )
                              }

                              Text(
                                  note.updatedAt,
                                  style = MaterialTheme.typography.labelSmall,
                                  color = MaterialTheme.colorScheme.onSurfaceVariant
                              )
                          }
                      }

                      Text(
                          note.body,
                          style = MaterialTheme.typography.bodyMedium,
                          color = MaterialTheme.colorScheme.onSurfaceVariant,
                          maxLines = 3,
                          overflow = TextOverflow.Ellipsis
                      )

                      Row(horizontalArrangement = Arrangement.spacedBy(8.dp)) {
                          AssistChip(onClick = {}, label = { Text(note.folder) }, leadingIcon = {
                              Icon(Icons.Default.Folder, contentDescription = null, modifier = Modifier.size(16.dp))
                          })
                          AssistChip(onClick = {}, label = { Text("#${note.tag}") })
                      }

                      Divider(color = MaterialTheme.colorScheme.surfaceVariant)

                      Row(horizontalArrangement = Arrangement.spacedBy(2.dp)) {
                          IconButton(onClick = { vm.togglePin(note) }) {
                              Icon(Icons.Default.PushPin, contentDescription = "Pin")
                          }
                          IconButton(onClick = { vm.toggleFavorite(note) }) {
                              Icon(if (note.favorite) Icons.Default.Star else Icons.Default.StarBorder, contentDescription = "Favorite")
                          }
                          IconButton(onClick = { vm.duplicate(note) }) {
                              Icon(Icons.Default.ContentCopy, contentDescription = "Duplicate")
                          }

                          Spacer(Modifier.weight(1f))

                          if (note.trashed || note.archived) {
                              IconButton(onClick = { vm.restore(note) }) {
                                  Icon(Icons.Default.Restore, contentDescription = "Restore")
                              }
                          } else {
                              IconButton(onClick = { vm.archive(note) }) {
                                  Icon(Icons.Default.Archive, contentDescription = "Archive")
                              }
                              IconButton(onClick = { vm.requestDelete(note) }) {
                                  Icon(Icons.Default.Delete, contentDescription = "Trash")
                              }
                          }

                          if (note.trashed) {
                              IconButton(onClick = { vm.deleteForever(note) }) {
                                  Icon(Icons.Default.DeleteForever, contentDescription = "Delete forever")
                              }
                          }
                      }
                  }
              }
          }

          @Composable
          fun EmptyState() {
              Box(
                  modifier = Modifier.fillMaxSize(),
                  contentAlignment = Alignment.Center
              ) {
                  Column(
                      horizontalAlignment = Alignment.CenterHorizontally,
                      verticalArrangement = Arrangement.spacedBy(12.dp),
                      modifier = Modifier.padding(30.dp)
                  ) {
                      Box(
                          modifier = Modifier
                              .size(86.dp)
                              .clip(RoundedCornerShape(28.dp))
                              .background(MaterialTheme.colorScheme.surfaceVariant),
                          contentAlignment = Alignment.Center
                      ) {
                          Icon(Icons.Default.NoteAlt, contentDescription = null, modifier = Modifier.size(46.dp))
                      }
                      Text("Nothing here yet", style = MaterialTheme.typography.titleLarge, fontWeight = FontWeight.Bold)
                      Text(
                          "Create, restore, or search notes to see them here.",
                          color = MaterialTheme.colorScheme.onSurfaceVariant
                      )
                  }
              }
          }
          """)

          write(f"{base}/ui/screens/HomeScreen.kt", """
          package com.notes.app.ui.screens

          import androidx.compose.foundation.layout.*
          import androidx.compose.material.icons.Icons
          import androidx.compose.material.icons.filled.Search
          import androidx.compose.material3.*
          import androidx.compose.runtime.Composable
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.text.font.FontWeight
          import androidx.compose.ui.unit.dp
          import com.notes.app.NotesViewModel

          @Composable
          fun HomeScreen(vm: NotesViewModel) {
              Column(
                  modifier = Modifier
                      .fillMaxSize()
                      .padding(horizontal = 18.dp),
                  verticalArrangement = Arrangement.spacedBy(18.dp)
              ) {
                  HeroDashboard(vm)

                  OutlinedTextField(
                      value = vm.query,
                      onValueChange = vm::updateQuery,
                      modifier = Modifier.fillMaxWidth(),
                      leadingIcon = { Icon(Icons.Default.Search, contentDescription = null) },
                      label = { Text("Search notes, folders, or tags") },
                      singleLine = true,
                      shape = MaterialTheme.shapes.extraLarge
                  )

                  FolderFilters(vm)

                  if (vm.pinnedNotes.isNotEmpty()) {
                      Text("Pinned", style = MaterialTheme.typography.titleLarge, fontWeight = FontWeight.Bold)
                      NotesListContent(vm, vm.pinnedNotes)
                  } else {
                      Text("All Notes", style = MaterialTheme.typography.titleLarge, fontWeight = FontWeight.Bold)
                      NotesListContent(vm, vm.filteredNotes)
                  }
              }
          }

          @Composable
          fun NotesListScreen(vm: NotesViewModel, title: String) {
              Column(
                  modifier = Modifier
                      .fillMaxSize()
                      .padding(horizontal = 18.dp),
                  verticalArrangement = Arrangement.spacedBy(18.dp)
              ) {
                  Text(title, style = MaterialTheme.typography.headlineMedium, fontWeight = FontWeight.Bold)
                  FolderFilters(vm)
                  NotesListContent(vm, vm.filteredNotes)
              }
          }
          """)

          write(f"{base}/ui/screens/EditorScreen.kt", """
          package com.notes.app.ui.screens

          import androidx.compose.foundation.layout.*
          import androidx.compose.material.icons.Icons
          import androidx.compose.material.icons.filled.Check
          import androidx.compose.material.icons.filled.Close
          import androidx.compose.material3.*
          import androidx.compose.runtime.*
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.text.font.FontWeight
          import androidx.compose.ui.unit.dp
          import com.notes.app.NotesViewModel

          @Composable
          fun EditorScreen(vm: NotesViewModel) {
              val editing = vm.selectedNote

              var title by remember(editing?.id) { mutableStateOf(editing?.title ?: "") }
              var body by remember(editing?.id) { mutableStateOf(editing?.body ?: "") }
              var folder by remember(editing?.id) { mutableStateOf(editing?.folder ?: "Personal") }
              var tag by remember(editing?.id) { mutableStateOf(editing?.tag ?: "General") }

              Column(
                  modifier = Modifier
                      .fillMaxSize()
                      .padding(18.dp),
                  verticalArrangement = Arrangement.spacedBy(16.dp)
              ) {
                  Row(
                      modifier = Modifier.fillMaxWidth(),
                      horizontalArrangement = Arrangement.SpaceBetween
                  ) {
                      Column {
                          Text(
                              if (editing == null) "New Note" else "Edit Note",
                              style = MaterialTheme.typography.headlineMedium,
                              fontWeight = FontWeight.Bold
                          )
                          Text(
                              "Autosaves when you press Save",
                              style = MaterialTheme.typography.labelLarge,
                              color = MaterialTheme.colorScheme.onSurfaceVariant
                          )
                      }

                      Row {
                          IconButton(onClick = { vm.cancelEdit() }) {
                              Icon(Icons.Default.Close, contentDescription = "Cancel")
                          }
                          FilledIconButton(onClick = { vm.save(title, body, folder, tag) }) {
                              Icon(Icons.Default.Check, contentDescription = "Save")
                          }
                      }
                  }

                  OutlinedTextField(
                      value = title,
                      onValueChange = { title = it },
                      modifier = Modifier.fillMaxWidth(),
                      label = { Text("Title") },
                      singleLine = true,
                      textStyle = MaterialTheme.typography.titleLarge,
                      shape = MaterialTheme.shapes.extraLarge
                  )

                  Row(horizontalArrangement = Arrangement.spacedBy(12.dp)) {
                      OutlinedTextField(
                          value = folder,
                          onValueChange = { folder = it },
                          modifier = Modifier.weight(1f),
                          label = { Text("Folder") },
                          singleLine = true,
                          shape = MaterialTheme.shapes.extraLarge
                      )

                      OutlinedTextField(
                          value = tag,
                          onValueChange = { tag = it },
                          modifier = Modifier.weight(1f),
