      - name: Verify release keystore exists
        run: |
          if [ ! -f app/signing/notes-release.jks ]; then
            echo "Release keystore missing. Creating a new one."
            mkdir -p app/signing
            keytool -genkeypair \
              -v \
              -keystore app/signing/notes-release.jks \
              -storepass notespassword \
              -alias noteskey \
              -keypass notespassword \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Notes,O=Notes App,C=US"
          fi

          keytool -list \
            -keystore app/signing/notes-release.jks \
            -storepass notespassword \
            -alias noteskey

      - name: Ensure Gradle wrapper
        run: |
          if [ ! -f ./gradlew ]; then
            gradle wrapper --gradle-version 8.7
          fi
          chmod +x ./gradlew

      - name: Build debug APK
        run: |
          set -o pipefail
          ./gradlew clean assembleDebug --stacktrace --info 2>&1 | tee build-logs/v2-debug-build.log

      - name: Build signed release APK
        run: |
          set -o pipefail
          ./gradlew assembleRelease --stacktrace --info 2>&1 | tee build-logs/v2-release-apk-build.log

      - name: Build signed release AAB
        run: |
          set -o pipefail
          ./gradlew bundleRelease --stacktrace --info 2>&1 | tee build-logs/v2-release-aab-build.log

      - name: Generate V2 build report
        if: always()
        run: |
          cat > BUILD_REPORT.md <<EOF
          # Notes V2 Build Report

          App Name: Notes
          Package Name: com.notes.app
          Version Code: ${{ github.event.inputs.version_code }}
          Version Name: ${{ github.event.inputs.version_name }}

          ## V2 Upgrades
          - Premium dashboard
          - Large top app bar
          - Extended FAB
          - Improved note cards
          - Improved editor
          - Premium settings screen
          - Better onboarding
          - Improved dark/light color system

          ## Outputs
          - Debug APK
          - Signed Release APK
          - Signed Release AAB
          EOF

      - name: Upload debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notes-v2-debug-apk
          path: |
            **/build/outputs/apk/debug/*.apk

      - name: Upload signed release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notes-v2-signed-release-apk
          path: |
            **/build/outputs/apk/release/*.apk

      - name: Upload signed release AAB
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notes-v2-signed-release-aab
          path: |
            **/build/outputs/bundle/release/*.aab

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notes-v2-build-logs
          path: |
            build-logs/
            BUILD_REPORT.md
            **/build/reports/
            **/outputs/logs/

      - name: Commit Notes V2 upgrade
        if: always()
        run: |
          git config user.name "Notes V2 UI Upgrade"
          git config user.email "actions@github.com"

          git add .
          git commit -m "Upgrade Notes app to V2 premium UI" || echo "No changes to commit"
          git push || echo "Push skipped"
