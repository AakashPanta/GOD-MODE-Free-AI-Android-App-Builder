name: Fix Project Core Final

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Reset Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper

          cat > gradle/wrapper/gradle-wrapper.properties <<'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: Reset root build.gradle.kts (stable versions)
        run: |
          cat > build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application") version "8.3.2" apply false
              id("org.jetbrains.kotlin.android") version "1.9.22" apply false
          }
          EOF

      - name: Reset settings.gradle.kts
        run: |
          cat > settings.gradle.kts <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = "Notes"
          include(":app")
          EOF

      - name: Fix gradle.properties
        run: |
          cat > gradle.properties <<'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
          kotlin.code.style=official
          EOF

      - name: Fix app/build.gradle.kts (fully aligned)
        run: |
          cat > app/build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }

          android {
              namespace = "com.notes.app"
              compileSdk = 34

              defaultConfig {
                  applicationId = "com.notes.app"
                  minSdk = 26
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0"
              }

              signingConfigs {
                  create("release") {
                      storeFile = file("signing/notes-release.jks")
                      storePassword = "notespassword"
                      keyAlias = "noteskey"
                      keyPassword = "notespassword"
                  }
              }

              buildTypes {
                  debug {
                      applicationIdSuffix = ".debug"
                      versionNameSuffix = "-debug"
                  }
                  release {
                      isMinifyEnabled = false
                      signingConfig = signingConfigs.getByName("release")
                  }
              }

              buildFeatures {
                  compose = true
              }

              composeOptions {
                  kotlinCompilerExtensionVersion = "1.5.10"
              }

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = "17"
              }
          }

          dependencies {
              implementation("androidx.core:core-ktx:1.12.0")
              implementation("androidx.activity:activity-compose:1.8.2")
              implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.7.0")
              implementation("androidx.lifecycle:lifecycle-viewmodel-compose:2.7.0")

              implementation(platform("androidx.compose:compose-bom:2024.02.01"))
              implementation("androidx.compose.ui:ui")
              implementation("androidx.compose.ui:ui-tooling-preview")
              implementation("androidx.compose.material3:material3")
              implementation("androidx.compose.foundation:foundation")
              implementation("androidx.compose.material:material-icons-extended")

              debugImplementation("androidx.compose.ui:ui-tooling")
          }
          EOF

      - name: Fix theme resources
        run: |
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/values-night

          cat > app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar"/>
          </resources>
          EOF

          cat > app/src/main/res/values-night/styles.xml <<'EOF'
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.NoActionBar"/>
          </resources>
          EOF

      - name: Ensure signing folder exists
        run: |
          mkdir -p app/signing
          touch app/signing/.gitkeep

      - name: Commit final core fix
        run: |
          git config user.name "Core Fix Bot"
          git config user.email "actions@github.com"

          git add .
          git commit -m "Final core fix: stable Gradle + SDK alignment" || echo "No changes"
          git push || echo "Push skipped"
