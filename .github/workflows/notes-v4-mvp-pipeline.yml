                              IconButton(onClick = { vm.requestDelete(note) }) { Icon(Icons.Default.Delete, "Trash") }
                          }
                          if (note.trashed) IconButton(onClick = { vm.deleteForever(note) }) { Icon(Icons.Default.DeleteForever, "Delete forever") }
                      }
