name: Notes V4 MVP Pipeline

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: "Android versionCode"
        required: true
        default: "4"
        type: string
      version_name:
        description: "Android versionName"
        required: true
        default: "4.0.0"
        type: string
      build_type:
        description: "Build type"
        required: true
        default: "all"
        type: choice
        options:
          - debug
          - release
          - all

permissions:
  contents: write

jobs:
  notes-v4-mvp:
    name: Build Notes V4 MVP
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      ANDROID_HOME: /opt/android-sdk
      ANDROID_SDK_ROOT: /opt/android-sdk
      ANDROID_USER_HOME: /home/runner/.android
      GRADLE_USER_HOME: /home/runner/.gradle
      JAVA_TOOL_OPTIONS: -Duser.home=/home/runner

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare environment
        run: |
          mkdir -p "$ANDROID_USER_HOME" "$GRADLE_USER_HOME" build-logs app/signing
          chmod -R 777 "$ANDROID_USER_HOME" "$GRADLE_USER_HOME"

      - name: Install packages
        run: |
          sudo apt update
          sudo apt install -y curl wget unzip zip git openjdk-17-jdk gradle python3

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android SDK
        run: |
          sudo mkdir -p "$ANDROID_HOME/cmdline-tools"
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          sudo rm -rf "$ANDROID_HOME/cmdline-tools/latest"
          sudo mv cmdline-tools "$ANDROID_HOME/cmdline-tools/latest"
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$ANDROID_HOME/platform-tools" >> "$GITHUB_PATH"
          yes | sudo "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true
          sudo "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Apply Notes V4 MVP upgrade
        env:
          VERSION_CODE: ${{ github.event.inputs.version_code }}
          VERSION_NAME: ${{ github.event.inputs.version_name }}
        run: |
          python3 <<'PY'
          from pathlib import Path
          import os

          version_code = os.environ["VERSION_CODE"]
          version_name = os.environ["VERSION_NAME"]
          base = Path("app/src/main/java/com/notes/app")

          def write(path, content):
              p = Path(path)
              p.parent.mkdir(parents=True, exist_ok=True)
              p.write_text(content.strip() + "\n")

          def remove(path):
              p = Path(path)
              if p.exists():
                  p.unlink()

          remove(base / "ui/screens/OnboardingScreen.kt")

          write("settings.gradle.kts", """
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = "Notes"
          include(":app")
          """)

          write("build.gradle.kts", """
          plugins {
              id("com.android.application") version "8.3.2" apply false
              id("org.jetbrains.kotlin.android") version "1.9.22" apply false
          }
          """)

          write("gradle.properties", """
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
          kotlin.code.style=official
          """)

          write("app/build.gradle.kts", f"""
          plugins {{
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }}

          android {{
              namespace = "com.notes.app"
              compileSdk = 34

              defaultConfig {{
                  applicationId = "com.notes.app"
                  minSdk = 26
                  targetSdk = 34
                  versionCode = {version_code}
                  versionName = "{version_name}"
              }}

              signingConfigs {{
                  create("release") {{
                      storeFile = file("signing/notes-release.jks")
                      storePassword = "notespassword"
                      keyAlias = "noteskey"
                      keyPassword = "notespassword"
                  }}
              }}

              buildTypes {{
                  debug {{
                      applicationIdSuffix = ".debug"
                      versionNameSuffix = "-debug"
                  }}

                  release {{
                      isMinifyEnabled = false
                      isShrinkResources = false
                      signingConfig = signingConfigs.getByName("release")
                  }}
              }}

              buildFeatures {{
                  compose = true
              }}

              composeOptions {{
                  kotlinCompilerExtensionVersion = "1.5.10"
              }}

              compileOptions {{
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }}

              kotlinOptions {{
                  jvmTarget = "17"
              }}
          }}

          dependencies {{
              implementation("androidx.core:core-ktx:1.12.0")
              implementation("androidx.activity:activity-compose:1.8.2")
              implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.7.0")
              implementation("androidx.lifecycle:lifecycle-viewmodel-compose:2.7.0")
              implementation(platform("androidx.compose:compose-bom:2024.02.01"))
              implementation("androidx.compose.ui:ui")
              implementation("androidx.compose.ui:ui-tooling-preview")
              implementation("androidx.compose.foundation:foundation")
              implementation("androidx.compose.material3:material3")
              implementation("androidx.compose.material:material-icons-extended")
              debugImplementation("androidx.compose.ui:ui-tooling")
          }}
          """)

          write("app/src/main/AndroidManifest.xml", """
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="true"
                  android:label="Notes"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          """)

          write("app/src/main/res/values/styles.xml", """
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar"/>
          </resources>
          """)

          write("app/src/main/res/values-night/styles.xml", """
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.NoActionBar"/>
          </resources>
          """)

          write(base / "MainActivity.kt", """
          package com.notes.app

          import android.os.Bundle
          import androidx.activity.ComponentActivity
          import androidx.activity.compose.setContent
          import androidx.lifecycle.viewmodel.compose.viewModel
          import com.notes.app.ui.NotesApp
          import com.notes.app.ui.theme.NotesTheme

          class MainActivity : ComponentActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContent {
                      val vm: NotesViewModel = viewModel()
                      NotesTheme(themeName = vm.themeName, darkTheme = vm.darkTheme) {
                          NotesApp(vm = vm)
                      }
                  }
              }
          }
          """)

          write(base / "Note.kt", """
          package com.notes.app

          import java.text.SimpleDateFormat
          import java.util.Date
          import java.util.Locale
          import java.util.UUID

          data class Note(
              val id: String = UUID.randomUUID().toString(),
              val title: String,
              val body: String,
              val label: String = "Personal",
              val tags: String = "General",
              val color: Long = 0xFF8EA7FF,
              val pinned: Boolean = false,
              val favorite: Boolean = false,
              val archived: Boolean = false,
              val trashed: Boolean = false,
              val locked: Boolean = false,
              val createdAt: String = now(),
              val updatedAt: String = now()
          )

          fun now(): String {
              return SimpleDateFormat("dd MMM yyyy, HH:mm", Locale.getDefault()).format(Date())
          }

          enum class Screen {
              LOCK, ONBOARDING, HOME, EDITOR, LABELS, FAVORITES, ARCHIVE, TRASH, SETTINGS, EXPORT_IMPORT, ABOUT, INSIGHTS
          }

          enum class ViewMode { LIST, GRID, COMPACT }
          enum class SortMode { UPDATED, CREATED, TITLE, LABEL }
          """)

          write(base / "NotesStore.kt", """
          package com.notes.app

          import android.content.Context
          import org.json.JSONArray
          import org.json.JSONObject
          import java.io.File
          import java.util.UUID

          class NotesStore(context: Context) {
              private val notesFile = File(context.filesDir, "notes-v4-mvp.json")
              private val backupFile = File(context.filesDir, "notes-v4-mvp-backup.json")
              private val exportFile = File(context.filesDir, "notes-export.json")
              private val prefs = context.getSharedPreferences("notes_v4_mvp_settings", Context.MODE_PRIVATE)

              fun hasCompletedOnboarding(): Boolean = prefs.getBoolean("onboarding_done", false)
              fun setOnboardingDone() { prefs.edit().putBoolean("onboarding_done", true).apply() }
              fun isDarkTheme(): Boolean = prefs.getBoolean("dark_theme", true)
              fun setDarkTheme(value: Boolean) { prefs.edit().putBoolean("dark_theme", value).apply() }
              fun themeName(): String = prefs.getString("theme_name", "Indigo") ?: "Indigo"
              fun setThemeName(value: String) { prefs.edit().putString("theme_name", value).apply() }

              fun viewMode(): ViewMode = when (prefs.getString("view_mode", "LIST")) {
                  "GRID" -> ViewMode.GRID
                  "COMPACT" -> ViewMode.COMPACT
                  else -> ViewMode.LIST
              }
              fun setViewMode(value: ViewMode) { prefs.edit().putString("view_mode", value.name).apply() }

              fun sortMode(): SortMode = when (prefs.getString("sort_mode", "UPDATED")) {
                  "CREATED" -> SortMode.CREATED
                  "TITLE" -> SortMode.TITLE
                  "LABEL" -> SortMode.LABEL
                  else -> SortMode.UPDATED
              }
              fun setSortMode(value: SortMode) { prefs.edit().putString("sort_mode", value.name).apply() }

              fun appLockEnabled(): Boolean = prefs.getBoolean("lock_enabled", false)
              fun setAppLockEnabled(value: Boolean) { prefs.edit().putBoolean("lock_enabled", value).apply() }
              fun lockPin(): String = prefs.getString("lock_pin", "1234") ?: "1234"
              fun setLockPin(value: String) { prefs.edit().putString("lock_pin", value).apply() }

              fun loadNotes(): List<Note> = try {
                  if (!notesFile.exists()) emptyList() else decodeNotes(notesFile.readText())
              } catch (_: Exception) {
                  try { if (!backupFile.exists()) emptyList() else decodeNotes(backupFile.readText()) } catch (_: Exception) { emptyList() }
              }

              fun saveNotes(notes: List<Note>) {
                  val encoded = encodeNotes(notes)
                  backupFile.writeText(encoded)
                  notesFile.writeText(encoded)
              }

              fun exportNotes(notes: List<Note>): String {
                  val data = encodeNotes(notes)
                  exportFile.writeText(data)
                  return exportFile.absolutePath
              }

              fun importFromLastExport(): List<Note> = try {
                  if (!exportFile.exists()) emptyList() else decodeNotes(exportFile.readText())
              } catch (_: Exception) { emptyList() }

              private fun encodeNotes(notes: List<Note>): String {
                  val array = JSONArray()
                  notes.forEach { note ->
                      array.put(JSONObject().apply {
                          put("id", note.id)
                          put("title", note.title)
                          put("body", note.body)
                          put("label", note.label)
                          put("tags", note.tags)
                          put("color", note.color)
                          put("pinned", note.pinned)
                          put("favorite", note.favorite)
                          put("archived", note.archived)
                          put("trashed", note.trashed)
                          put("locked", note.locked)
                          put("createdAt", note.createdAt)
                          put("updatedAt", note.updatedAt)
                      })
                  }
                  return array.toString(2)
              }

              private fun decodeNotes(raw: String): List<Note> {
                  val array = JSONArray(raw)
                  return List(array.length()) { index ->
                      val item = array.getJSONObject(index)
                      val updated = item.optString("updatedAt", now())
                      Note(
                          id = item.optString("id", UUID.randomUUID().toString()),
                          title = item.optString("title", "Untitled Note"),
                          body = item.optString("body", ""),
                          label = item.optString("label", item.optString("folder", "Personal")),
                          tags = item.optString("tags", item.optString("tag", "General")),
                          color = item.optLong("color", 0xFF8EA7FF),
                          pinned = item.optBoolean("pinned", false),
                          favorite = item.optBoolean("favorite", false),
                          archived = item.optBoolean("archived", false),
                          trashed = item.optBoolean("trashed", false),
                          locked = item.optBoolean("locked", false),
                          createdAt = item.optString("createdAt", updated),
                          updatedAt = updated
                      )
                  }
              }
          }
          """)

          write(base / "NotesViewModel.kt", """
          package com.notes.app

          import android.app.Application
          import androidx.compose.runtime.getValue
          import androidx.compose.runtime.mutableStateOf
          import androidx.compose.runtime.setValue
          import androidx.lifecycle.AndroidViewModel
          import java.util.UUID

          class NotesViewModel(application: Application) : AndroidViewModel(application) {
              private val store = NotesStore(application)

              var unlocked by mutableStateOf(!store.appLockEnabled())
                  private set
              var screen by mutableStateOf(if (store.appLockEnabled()) Screen.LOCK else if (store.hasCompletedOnboarding()) Screen.HOME else Screen.ONBOARDING)
                  private set
              var selectedNote by mutableStateOf<Note?>(null)
                  private set
              var query by mutableStateOf("")
                  private set
              var selectedLabel by mutableStateOf("All")
                  private set
              var darkTheme by mutableStateOf(store.isDarkTheme())
                  private set
              var themeName by mutableStateOf(store.themeName())
                  private set
              var viewMode by mutableStateOf(store.viewMode())
                  private set
              var sortMode by mutableStateOf(store.sortMode())
                  private set
              var showDeleteDialog by mutableStateOf<Note?>(null)
                  private set
              var exportMessage by mutableStateOf("")
                  private set
              var snackbarMessage by mutableStateOf("")
                  private set
              var notes by mutableStateOf(loadInitialNotes())
                  private set

              private fun loadInitialNotes(): List<Note> {
                  val saved = store.loadNotes()
                  return saved.ifEmpty {
                      listOf(
                          Note(title = "Welcome to Notes", body = "Capture, organize, and find your notes faster.", label = "Inbox", tags = "Start", pinned = true),
                          Note(title = "MVP Ready", body = "Create, edit, delete, favorite, label, search, sort, filter, and persist notes locally.", label = "Productivity", tags = "MVP", favorite = true)
                      )
                  }
              }

              private fun persist() { store.saveNotes(notes) }

              val labels: List<String>
                  get() = listOf("All") + notes.filter { !it.trashed && !it.archived }.map { it.label.ifBlank { "Personal" } }.distinct().sorted()
              val activeNotes: List<Note>
                  get() = notes.filter { !it.trashed && !it.archived }
              val pinnedNotes: List<Note>
                  get() = activeNotes.filter { it.pinned }
              val favoriteNotes: List<Note>
                  get() = activeNotes.filter { it.favorite }
              val archivedNotes: List<Note>
                  get() = notes.filter { it.archived && !it.trashed }
              val trashNotes: List<Note>
                  get() = notes.filter { it.trashed }
              val totalWords: Int
                  get() = activeNotes.sumOf { it.body.split(Regex("\\s+")).filter { word -> word.isNotBlank() }.size }

              val filteredNotes: List<Note>
                  get() {
                      val base = when (screen) {
                          Screen.TRASH -> trashNotes
                          Screen.ARCHIVE -> archivedNotes
                          Screen.FAVORITES -> favoriteNotes
                          else -> activeNotes
                      }.let { list -> if (selectedLabel == "All") list else list.filter { it.label == selectedLabel } }

                      val searched = if (query.isBlank()) base else base.filter {
                          it.title.contains(query, true) || it.body.contains(query, true) || it.label.contains(query, true) || it.tags.contains(query, true)
                      }

                      return when (sortMode) {
                          SortMode.TITLE -> searched.sortedBy { it.title.lowercase() }
                          SortMode.LABEL -> searched.sortedBy { it.label.lowercase() }
                          SortMode.CREATED -> searched.sortedByDescending { it.createdAt }
                          SortMode.UPDATED -> searched.sortedByDescending { it.updatedAt }
                      }
                  }

              fun consumeSnackbar() { snackbarMessage = "" }
              fun unlock(pin: String): Boolean {
                  val ok = pin == store.lockPin()
                  if (ok) {
                      unlocked = true
                      screen = if (store.hasCompletedOnboarding()) Screen.HOME else Screen.ONBOARDING
                  }
                  return ok
              }
              fun finishOnboarding() { store.setOnboardingDone(); screen = Screen.HOME }
              fun navigate(target: Screen) { screen = target; if (target != Screen.EDITOR) selectedNote = null }
              fun updateQuery(value: String) { query = value }
              fun clearQuery() { query = "" }
              fun selectLabel(value: String) { selectedLabel = value }
              fun toggleTheme() { darkTheme = !darkTheme; store.setDarkTheme(darkTheme) }
              fun setTheme(value: String) { themeName = value; store.setThemeName(value) }
              fun setViewMode(value: ViewMode) { viewMode = value; store.setViewMode(value) }
              fun cycleViewMode() {
                  viewMode = when (viewMode) { ViewMode.LIST -> ViewMode.GRID; ViewMode.GRID -> ViewMode.COMPACT; ViewMode.COMPACT -> ViewMode.LIST }
                  store.setViewMode(viewMode)
              }
              fun setSort(value: SortMode) { sortMode = value; store.setSortMode(value) }
              fun setLock(enabled: Boolean, pin: String) { store.setAppLockEnabled(enabled); if (pin.length >= 4) store.setLockPin(pin); snackbarMessage = if (enabled) "App lock enabled" else "App lock disabled" }
              fun newNote() { selectedNote = null; screen = Screen.EDITOR }
              fun edit(note: Note) { selectedNote = note; screen = Screen.EDITOR }
              fun cancelEdit() { selectedNote = null; screen = Screen.HOME }

              fun save(title: String, body: String, label: String, tags: String, color: Long, locked: Boolean, favorite: Boolean, pinned: Boolean) {
                  val cleanTitle = title.ifBlank { "Untitled Note" }
                  val cleanBody = body.ifBlank { "No content" }
                  val cleanLabel = label.ifBlank { "Personal" }
                  val cleanTags = tags.ifBlank { "General" }
                  val existing = selectedNote
                  notes = if (existing == null || notes.none { it.id == existing.id }) {
                      listOf(Note(title = cleanTitle, body = cleanBody, label = cleanLabel, tags = cleanTags, color = color, locked = locked, favorite = favorite, pinned = pinned)) + notes
                  } else {
                      notes.map { if (it.id == existing.id) it.copy(title = cleanTitle, body = cleanBody, label = cleanLabel, tags = cleanTags, color = color, locked = locked, favorite = favorite, pinned = pinned, updatedAt = now()) else it }
                  }
                  selectedNote = null
                  screen = Screen.HOME
                  persist()
                  snackbarMessage = "Note saved"
              }

              fun togglePin(note: Note) { notes = notes.map { if (it.id == note.id) it.copy(pinned = !it.pinned, updatedAt = now()) else it }; persist() }
              fun toggleFavorite(note: Note) { notes = notes.map { if (it.id == note.id) it.copy(favorite = !it.favorite, updatedAt = now()) else it }; persist() }
              fun duplicate(note: Note) { notes = listOf(note.copy(id = UUID.randomUUID().toString(), title = note.title + " Copy", createdAt = now(), updatedAt = now())) + notes; persist(); snackbarMessage = "Note duplicated" }
              fun archive(note: Note) { notes = notes.map { if (it.id == note.id) it.copy(archived = true, trashed = false, updatedAt = now()) else it }; persist(); snackbarMessage = "Moved to archive" }
              fun requestDelete(note: Note) { showDeleteDialog = note }
              fun dismissDeleteDialog() { showDeleteDialog = null }
              fun moveToTrashConfirmed() { val note = showDeleteDialog ?: return; notes = notes.map { if (it.id == note.id) it.copy(trashed = true, archived = false, updatedAt = now()) else it }; showDeleteDialog = null; persist(); snackbarMessage = "Note deleted" }
              fun restore(note: Note) { notes = notes.map { if (it.id == note.id) it.copy(trashed = false, archived = false, updatedAt = now()) else it }; persist(); snackbarMessage = "Note restored" }
              fun deleteForever(note: Note) { notes = notes.filterNot { it.id == note.id }; persist(); snackbarMessage = "Deleted forever" }
              fun emptyTrash() { notes = notes.filterNot { it.trashed }; persist(); snackbarMessage = "Trash emptied" }
              fun exportNotes() { exportMessage = "Exported to: " + store.exportNotes(notes) }
              fun importLastExport() {
                  val imported = store.importFromLastExport()
                  if (imported.isNotEmpty()) { notes = imported; persist(); exportMessage = "Imported ${imported.size} notes from last export." } else { exportMessage = "No export file found yet." }
              }
          }
          """)

          write(base / "ui/theme/Theme.kt", """
          package com.notes.app.ui.theme

          import androidx.compose.foundation.shape.RoundedCornerShape
          import androidx.compose.material3.MaterialTheme
          import androidx.compose.material3.Shapes
          import androidx.compose.material3.darkColorScheme
          import androidx.compose.material3.lightColorScheme
          import androidx.compose.runtime.Composable
          import androidx.compose.ui.graphics.Color
          import androidx.compose.ui.unit.dp

          private fun darkScheme(themeName: String) = when (themeName) {
              "Emerald" -> darkColorScheme(primary = Color(0xFF7BE4B2), secondary = Color(0xFFA8F0CF), tertiary = Color(0xFFFFD166), background = Color(0xFF06110D), surface = Color(0xFF101C17), surfaceVariant = Color(0xFF172820))
              "Sunset" -> darkColorScheme(primary = Color(0xFFFFB26B), secondary = Color(0xFFFFD0A3), tertiary = Color(0xFFFF7A90), background = Color(0xFF120B08), surface = Color(0xFF211713), surfaceVariant = Color(0xFF2E2018))
              "Rose" -> darkColorScheme(primary = Color(0xFFFF9BCB), secondary = Color(0xFFFFC1DC), tertiary = Color(0xFFAFC7FF), background = Color(0xFF14070F), surface = Color(0xFF22101A), surfaceVariant = Color(0xFF321827))
              else -> darkColorScheme(primary = Color(0xFF9DB4FF), secondary = Color(0xFFC6D2FF), tertiary = Color(0xFFFFC77D), background = Color(0xFF090B10), surface = Color(0xFF121722), surfaceVariant = Color(0xFF1B2230))
          }

          private fun lightScheme(themeName: String) = when (themeName) {
              "Emerald" -> lightColorScheme(primary = Color(0xFF007A4D), secondary = Color(0xFF276B50), tertiary = Color(0xFF966900), background = Color(0xFFF3FCF7), surface = Color.White, surfaceVariant = Color(0xFFE4F3EA))
              "Sunset" -> lightColorScheme(primary = Color(0xFFB75B00), secondary = Color(0xFF8F5C2D), tertiary = Color(0xFFB32646), background = Color(0xFFFFF7F0), surface = Color.White, surfaceVariant = Color(0xFFFFE8D6))
              "Rose" -> lightColorScheme(primary = Color(0xFFC02769), secondary = Color(0xFF8F4B68), tertiary = Color(0xFF3657D8), background = Color(0xFFFFF5FA), surface = Color.White, surfaceVariant = Color(0xFFFFE1EF))
              else -> lightColorScheme(primary = Color(0xFF3657D8), secondary = Color(0xFF5C6FAE), tertiary = Color(0xFF9B5C00), background = Color(0xFFF6F7FC), surface = Color.White, surfaceVariant = Color(0xFFE9ECF6))
          }

          private val NotesShapes = Shapes(
              small = RoundedCornerShape(12.dp),
              medium = RoundedCornerShape(20.dp),
              large = RoundedCornerShape(28.dp),
              extraLarge = RoundedCornerShape(34.dp)
          )

          @Composable
          fun NotesTheme(themeName: String, darkTheme: Boolean, content: @Composable () -> Unit) {
              MaterialTheme(colorScheme = if (darkTheme) darkScheme(themeName) else lightScheme(themeName), shapes = NotesShapes, content = content)
          }
          """)

          write(base / "ui/NotesApp.kt", """
          package com.notes.app.ui

          import androidx.compose.foundation.layout.Box
          import androidx.compose.foundation.layout.Column
          import androidx.compose.foundation.layout.padding
          import androidx.compose.material.icons.Icons
          import androidx.compose.material.icons.filled.*
          import androidx.compose.material3.*
          import androidx.compose.runtime.Composable
          import androidx.compose.runtime.LaunchedEffect
          import androidx.compose.runtime.remember
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.text.font.FontWeight
          import com.notes.app.NotesViewModel
          import com.notes.app.Screen
          import com.notes.app.ui.screens.*

          @OptIn(ExperimentalMaterial3Api::class)
          @Composable
          fun NotesApp(vm: NotesViewModel) {
              val snackbarHostState = remember { SnackbarHostState() }
              LaunchedEffect(vm.snackbarMessage) {
                  if (vm.snackbarMessage.isNotBlank()) {
                      snackbarHostState.showSnackbar(vm.snackbarMessage)
                      vm.consumeSnackbar()
                  }
              }

              when (vm.screen) {
                  Screen.LOCK -> { LockScreen(vm); return }
                  Screen.ONBOARDING -> { OnboardingScreen(vm); return }
                  else -> Unit
              }

