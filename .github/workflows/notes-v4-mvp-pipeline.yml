      - name: Verify release keystore exists
        run: |
          if [ ! -f app/signing/notes-release.jks ]; then
            mkdir -p app/signing
            keytool -genkeypair \
              -v \
              -keystore app/signing/notes-release.jks \
              -storepass notespassword \
              -alias noteskey \
              -keypass notespassword \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Notes,O=Notes App,C=US"
          fi

      - name: Ensure Gradle wrapper
        run: |
          if [ ! -f ./gradlew ]; then
            gradle wrapper --gradle-version 8.7
          fi
          chmod +x ./gradlew

      - name: Build debug APK
        if: github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == 'all'
        run: |
          set -o pipefail
          ./gradlew clean assembleDebug --stacktrace --info 2>&1 | tee build-logs/v4-mvp-debug-build.log

      - name: Build signed release APK
        if: github.event.inputs.build_type == 'release' || github.event.inputs.build_type == 'all'
        run: |
          set -o pipefail
          ./gradlew assembleRelease --stacktrace --info 2>&1 | tee build-logs/v4-mvp-release-apk-build.log

      - name: Build signed release AAB
        if: github.event.inputs.build_type == 'release' || github.event.inputs.build_type == 'all'
        run: |
          set -o pipefail
          ./gradlew bundleRelease --stacktrace --info 2>&1 | tee build-logs/v4-mvp-release-aab-build.log

      - name: Generate MVP report
        if: always()
        run: |
          cat > BUILD_REPORT.md <<EOF
          # Notes V4 MVP Build Report

          Version Code: ${{ github.event.inputs.version_code }}
          Version Name: ${{ github.event.inputs.version_name }}

          ## Fixed
          - Full-page Home scrolling
          - Tiny notes scroll-area bug
          - Duplicate save action removed
          - Professional editor layout
          - Search/filter/sort behavior
          - Local persistence
          - Theme persistence
          - View mode persistence

          ## Included
          - Create/edit/delete notes
          - Labels
          - Tags
          - Favorites
          - Pinned notes
          - Archive/trash
          - Dark/light mode
          - List/grid/compact view
          - Export/import
          - Build artifacts
          EOF

      - name: Upload APK/AAB artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notes-v4-mvp-artifacts
          path: |
            **/build/outputs/apk/**/*.apk
            **/build/outputs/bundle/**/*.aab
          if-no-files-found: warn

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notes-v4-mvp-build-logs
          path: |
            build-logs/
            BUILD_REPORT.md
            **/build/reports/
            **/outputs/logs/

      - name: Commit Notes V4 MVP upgrade
        if: always()
        run: |
          git config user.name "Notes V4 MVP Pipeline"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Upgrade Notes app to V4 MVP" || echo "No changes to commit"
          git push || echo "Push skipped"
