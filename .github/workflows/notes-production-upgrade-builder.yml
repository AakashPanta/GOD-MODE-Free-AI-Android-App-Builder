name: Notes Production Upgrade Builder

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Upgrade Notes App and Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      ANDROID_HOME: /opt/android-sdk
      ANDROID_SDK_ROOT: /opt/android-sdk
      ANDROID_USER_HOME: /home/runner/.android
      GRADLE_USER_HOME: /home/runner/.gradle
      JAVA_TOOL_OPTIONS: -Duser.home=/home/runner

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare environment
        run: |
          mkdir -p "$ANDROID_USER_HOME"
          mkdir -p "$GRADLE_USER_HOME"
          chmod -R 777 "$ANDROID_USER_HOME"
          chmod -R 777 "$GRADLE_USER_HOME"

      - name: Install packages
        run: |
          sudo apt update
          sudo apt install -y curl wget unzip zip git openjdk-17-jdk gradle python3

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android SDK
        run: |
          sudo mkdir -p "$ANDROID_HOME/cmdline-tools"
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          sudo rm -rf "$ANDROID_HOME/cmdline-tools/latest"
          sudo mv cmdline-tools "$ANDROID_HOME/cmdline-tools/latest"

          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$ANDROID_HOME/platform-tools" >> "$GITHUB_PATH"

          yes | sudo "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true

          sudo "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Generate production Notes app
        run: |
          python3 <<'PY'
          from pathlib import Path
          import shutil

          package = "com.notes.app"
          package_path = "com/notes/app"

          for path in ["app", "settings.gradle.kts", "build.gradle.kts", "gradle.properties"]:
              p = Path(path)
              if p.is_dir():
                  shutil.rmtree(p)
              elif p.exists():
                  p.unlink()

          def write(path, content):
              p = Path(path)
              p.parent.mkdir(parents=True, exist_ok=True)
              p.write_text(content.strip() + "\n")

          write("settings.gradle.kts", """
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = "Notes"
          include(":app")
          """)

          write("build.gradle.kts", """
          plugins {
              id("com.android.application") version "8.5.2" apply false
              id("org.jetbrains.kotlin.android") version "1.9.24" apply false
          }
          """)

          write("gradle.properties", """
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
          kotlin.code.style=official
          """)

          write("app/build.gradle.kts", """
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }

          android {
              namespace = "com.notes.app"
              compileSdk = 36

              defaultConfig {
                  applicationId = "com.notes.app"
                  minSdk = 26
                  targetSdk = 36
                  versionCode = 1
                  versionName = "1.0"
              }

              buildFeatures {
                  compose = true
              }

              composeOptions {
                  kotlinCompilerExtensionVersion = "1.5.14"
              }

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = "17"
              }
          }

          dependencies {
              implementation("androidx.core:core-ktx:1.13.1")
              implementation("androidx.activity:activity-compose:1.9.2")
              implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.8.4")
              implementation("androidx.lifecycle:lifecycle-viewmodel-compose:2.8.4")
              implementation(platform("androidx.compose:compose-bom:2024.06.00"))
              implementation("androidx.compose.ui:ui")
              implementation("androidx.compose.ui:ui-tooling-preview")
              implementation("androidx.compose.foundation:foundation")
              implementation("androidx.compose.material3:material3")
              implementation("androidx.compose.material:material-icons-extended")
              debugImplementation("androidx.compose.ui:ui-tooling")
          }
          """)

          write("app/src/main/AndroidManifest.xml", """
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:allowBackup="true"
                  android:label="Notes"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          """)

          write("app/src/main/res/values/styles.xml", """
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.Light.NoActionBar" />
          </resources>
          """)

          write("app/src/main/res/values-night/styles.xml", """
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.NoActionBar" />
          </resources>
          """)

          write("app/src/main/res/drawable/ic_launcher_background.xml", """
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path android:fillColor="#10131A" android:pathData="M0,0h108v108h-108z"/>
              <path android:fillColor="#8EA7FF" android:pathData="M28,22h52a8,8 0,0 1,8 8v48a8,8 0,0 1,-8 8h-52a8,8 0,0 1,-8 -8v-48a8,8 0,0 1,8 -8z"/>
              <path android:fillColor="#FFFFFF" android:pathData="M36,38h36v6h-36zM36,52h30v6h-30zM36,66h24v6h-24z"/>
          </vector>
          """)

          base = f"app/src/main/java/{package_path}"

          write(f"{base}/MainActivity.kt", """
          package com.notes.app

          import android.os.Bundle
          import androidx.activity.ComponentActivity
          import androidx.activity.compose.setContent
          import androidx.lifecycle.viewmodel.compose.viewModel
          import com.notes.app.ui.NotesApp
          import com.notes.app.ui.theme.NotesTheme

          class MainActivity : ComponentActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContent {
                      val vm: NotesViewModel = viewModel()
                      NotesTheme(darkTheme = vm.darkTheme) {
                          NotesApp(vm = vm)
                      }
                  }
              }
          }
          """)

          write(f"{base}/Note.kt", """
          package com.notes.app

          import java.text.SimpleDateFormat
          import java.util.Date
          import java.util.Locale
          import java.util.UUID

          data class Note(
              val id: String = UUID.randomUUID().toString(),
              val title: String,
              val body: String,
              val folder: String = "Personal",
              val tag: String = "General",
              val pinned: Boolean = false,
              val favorite: Boolean = false,
              val archived: Boolean = false,
              val trashed: Boolean = false,
              val updatedAt: String = now()
          )

          fun now(): String {
              return SimpleDateFormat("dd MMM yyyy, HH:mm", Locale.getDefault()).format(Date())
          }

          enum class Screen {
              ONBOARDING, HOME, EDITOR, FAVORITES, ARCHIVE, TRASH, SETTINGS
          }
          """)

          write(f"{base}/NotesStore.kt", """
          package com.notes.app

          import android.content.Context
          import org.json.JSONArray
          import org.json.JSONObject
          import java.io.File
          import java.util.UUID

          class NotesStore(context: Context) {
              private val notesFile = File(context.filesDir, "notes.json")
              private val prefs = context.getSharedPreferences("notes_settings", Context.MODE_PRIVATE)

              fun hasCompletedOnboarding(): Boolean {
                  return prefs.getBoolean("onboarding_done", false)
              }

              fun setOnboardingDone() {
                  prefs.edit().putBoolean("onboarding_done", true).apply()
              }

              fun isDarkTheme(): Boolean {
                  return prefs.getBoolean("dark_theme", true)
              }

              fun setDarkTheme(value: Boolean) {
                  prefs.edit().putBoolean("dark_theme", value).apply()
              }

              fun loadNotes(): List<Note> {
                  return try {
                      if (!notesFile.exists()) return emptyList()
                      val array = JSONArray(notesFile.readText())

                      List(array.length()) { index ->
                          val item = array.getJSONObject(index)
                          Note(
                              id = item.optString("id", UUID.randomUUID().toString()),
                              title = item.optString("title", "Untitled Note"),
                              body = item.optString("body", ""),
                              folder = item.optString("folder", "Personal"),
                              tag = item.optString("tag", "General"),
                              pinned = item.optBoolean("pinned", false),
                              favorite = item.optBoolean("favorite", false),
                              archived = item.optBoolean("archived", false),
                              trashed = item.optBoolean("trashed", false),
                              updatedAt = item.optString("updatedAt", now())
                          )
                      }
                  } catch (_: Exception) {
                      emptyList()
                  }
              }

              fun saveNotes(notes: List<Note>) {
                  val array = JSONArray()
                  notes.forEach { note ->
                      array.put(
                          JSONObject().apply {
                              put("id", note.id)
                              put("title", note.title)
                              put("body", note.body)
                              put("folder", note.folder)
                              put("tag", note.tag)
                              put("pinned", note.pinned)
                              put("favorite", note.favorite)
                              put("archived", note.archived)
                              put("trashed", note.trashed)
                              put("updatedAt", note.updatedAt)
                          }
                      )
                  }
                  notesFile.writeText(array.toString(2))
              }
          }
          """)

          write(f"{base}/NotesViewModel.kt", """
          package com.notes.app

          import android.app.Application
          import androidx.compose.runtime.getValue
          import androidx.compose.runtime.mutableStateOf
          import androidx.compose.runtime.setValue
          import androidx.lifecycle.AndroidViewModel
          import java.util.UUID

          class NotesViewModel(application: Application) : AndroidViewModel(application) {
              private val store = NotesStore(application)

              var screen by mutableStateOf(
                  if (store.hasCompletedOnboarding()) Screen.HOME else Screen.ONBOARDING
              )
                  private set

              var selectedNote by mutableStateOf<Note?>(null)
                  private set

              var query by mutableStateOf("")
                  private set

              var selectedFolder by mutableStateOf("All")
                  private set

              var darkTheme by mutableStateOf(store.isDarkTheme())
                  private set

              var showDeleteDialog by mutableStateOf<Note?>(null)
                  private set

              var notes by mutableStateOf(loadInitialNotes())
                  private set

              private fun loadInitialNotes(): List<Note> {
                  val saved = store.loadNotes()
                  return saved.ifEmpty {
                      listOf(
                          Note(
                              title = "Welcome to Notes",
                              body = "Your notes are now saved permanently on this device.",
                              folder = "Inbox",
                              tag = "Start",
                              pinned = true
                          ),
                          Note(
                              title = "Production upgrade installed",
                              body = "This version includes persistence, editor polish, folders, filters, favorites, theme toggle, onboarding, and production structure.",
                              folder = "Productivity",
                              tag = "Upgrade",
                              favorite = true
                          )
                      )
                  }
              }

              private fun persist() {
                  store.saveNotes(notes)
              }

              val folders: List<String>
                  get() = listOf("All") + notes
                      .filter { !it.trashed && !it.archived }
                      .map { it.folder.ifBlank { "Personal" } }
                      .distinct()
                      .sorted()

              val activeNotes: List<Note>
                  get() = notes.filter { !it.trashed && !it.archived }

              val filteredNotes: List<Note>
                  get() {
                      val base = when (screen) {
                          Screen.TRASH -> notes.filter { it.trashed }
                          Screen.ARCHIVE -> notes.filter { it.archived && !it.trashed }
                          Screen.FAVORITES -> activeNotes.filter { it.favorite }
                          else -> activeNotes
                      }.let { list ->
                          if (selectedFolder == "All") list else list.filter { it.folder == selectedFolder }
                      }

                      if (query.isBlank()) return base

                      return base.filter {
                          it.title.contains(query, true) ||
                              it.body.contains(query, true) ||
                              it.folder.contains(query, true) ||
                              it.tag.contains(query, true)
                      }
                  }

              val pinnedNotes: List<Note>
                  get() = activeNotes.filter { it.pinned }

              fun finishOnboarding() {
                  store.setOnboardingDone()
                  screen = Screen.HOME
              }

              fun navigate(target: Screen) {
                  screen = target
                  if (target != Screen.EDITOR) selectedNote = null
              }

              fun updateQuery(value: String) {
                  query = value
              }

              fun selectFolder(value: String) {
                  selectedFolder = value
              }

              fun toggleTheme() {
                  darkTheme = !darkTheme
                  store.setDarkTheme(darkTheme)
              }

              fun newNote() {
                  selectedNote = null
                  screen = Screen.EDITOR
              }

              fun edit(note: Note) {
                  selectedNote = note
                  screen = Screen.EDITOR
              }

              fun cancelEdit() {
                  selectedNote = null
                  screen = Screen.HOME
              }

              fun save(title: String, body: String, folder: String, tag: String) {
                  val cleanTitle = title.ifBlank { "Untitled Note" }
                  val cleanBody = body.ifBlank { "No content" }
                  val cleanFolder = folder.ifBlank { "Personal" }
                  val cleanTag = tag.ifBlank { "General" }
                  val existing = selectedNote

                  notes = if (existing == null) {
                      listOf(
                          Note(
                              title = cleanTitle,
                              body = cleanBody,
                              folder = cleanFolder,
                              tag = cleanTag
                          )
                      ) + notes
                  } else {
                      notes.map {
                          if (it.id == existing.id) {
                              it.copy(
                                  title = cleanTitle,
                                  body = cleanBody,
                                  folder = cleanFolder,
                                  tag = cleanTag,
                                  updatedAt = now()
                              )
                          } else {
                              it
                          }
                      }
                  }

                  selectedNote = null
                  screen = Screen.HOME
                  persist()
              }

              fun togglePin(note: Note) {
                  notes = notes.map {
                      if (it.id == note.id) it.copy(pinned = !it.pinned, updatedAt = now()) else it
                  }
                  persist()
              }

              fun toggleFavorite(note: Note) {
                  notes = notes.map {
                      if (it.id == note.id) it.copy(favorite = !it.favorite, updatedAt = now()) else it
                  }
                  persist()
              }

              fun duplicate(note: Note) {
                  notes = listOf(
                      note.copy(
                          id = UUID.randomUUID().toString(),
                          title = note.title + " Copy",
                          updatedAt = now()
                      )
                  ) + notes
                  persist()
              }

              fun archive(note: Note) {
                  notes = notes.map {
                      if (it.id == note.id) it.copy(archived = true, trashed = false, updatedAt = now()) else it
                  }
                  persist()
              }

              fun requestDelete(note: Note) {
                  showDeleteDialog = note
              }

              fun dismissDeleteDialog() {
                  showDeleteDialog = null
              }

              fun moveToTrashConfirmed() {
                  val note = showDeleteDialog ?: return
                  notes = notes.map {
                      if (it.id == note.id) it.copy(trashed = true, archived = false, updatedAt = now()) else it
                  }
                  showDeleteDialog = null
                  persist()
              }

              fun restore(note: Note) {
                  notes = notes.map {
                      if (it.id == note.id) it.copy(trashed = false, archived = false, updatedAt = now()) else it
                  }
                  persist()
              }

              fun deleteForever(note: Note) {
                  notes = notes.filterNot { it.id == note.id }
                  persist()
              }
          }
          """)

          write(f"{base}/ui/theme/Theme.kt", """
          package com.notes.app.ui.theme

          import androidx.compose.material3.MaterialTheme
          import androidx.compose.material3.darkColorScheme
          import androidx.compose.material3.lightColorScheme
          import androidx.compose.runtime.Composable
          import androidx.compose.ui.graphics.Color

          private val DarkColors = darkColorScheme(
              primary = Color(0xFF8EA7FF),
              secondary = Color(0xFFB8C7FF),
              background = Color(0xFF10131A),
              surface = Color(0xFF181C25),
              onPrimary = Color(0xFF071025),
              onBackground = Color(0xFFF3F6FF),
              onSurface = Color(0xFFF3F6FF)
          )

          private val LightColors = lightColorScheme(
              primary = Color(0xFF3657D8),
              secondary = Color(0xFF5266A8),
              background = Color(0xFFF8F9FF),
              surface = Color(0xFFFFFFFF),
              onPrimary = Color.White,
              onBackground = Color(0xFF111827),
              onSurface = Color(0xFF111827)
          )

          @Composable
          fun NotesTheme(darkTheme: Boolean, content: @Composable () -> Unit) {
              MaterialTheme(
                  colorScheme = if (darkTheme) DarkColors else LightColors,
                  content = content
              )
          }
          """)

          write(f"{base}/ui/NotesApp.kt", """
          package com.notes.app.ui

          import androidx.compose.foundation.layout.Box
          import androidx.compose.foundation.layout.Column
          import androidx.compose.foundation.layout.padding
          import androidx.compose.material.icons.Icons
          import androidx.compose.material.icons.filled.*
          import androidx.compose.material3.*
          import androidx.compose.runtime.Composable
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.text.font.FontWeight
          import com.notes.app.NotesViewModel
          import com.notes.app.Screen
          import com.notes.app.ui.screens.*

          @OptIn(ExperimentalMaterial3Api::class)
          @Composable
          fun NotesApp(vm: NotesViewModel) {
              if (vm.screen == Screen.ONBOARDING) {
                  OnboardingScreen(vm)
                  return
              }

              DeleteConfirmationDialog(vm)

              Scaffold(
                  topBar = {
                      TopAppBar(
                          title = {
                              Column {
                                  Text("Notes", fontWeight = FontWeight.Bold)
                                  Text(
                                      text = "${vm.activeNotes.size} active notes",
                                      style = MaterialTheme.typography.labelMedium
                                  )
                              }
                          },
                          navigationIcon = {
                              if (vm.screen == Screen.EDITOR) {
                                  IconButton(onClick = { vm.cancelEdit() }) {
                                      Icon(Icons.Default.ArrowBack, contentDescription = "Back")
                                  }
                              }
                          },
                          actions = {
                              IconButton(onClick = { vm.toggleTheme() }) {
                                  Icon(
                                      if (vm.darkTheme) Icons.Default.LightMode else Icons.Default.DarkMode,
                                      contentDescription = "Theme"
                                  )
                              }
                              IconButton(onClick = { vm.navigate(Screen.SETTINGS) }) {
                                  Icon(Icons.Default.Settings, contentDescription = "Settings")
                              }
                          }
                      )
                  },
                  floatingActionButton = {
                      if (vm.screen != Screen.EDITOR) {
                          FloatingActionButton(onClick = { vm.newNote() }) {
                              Icon(Icons.Default.Add, contentDescription = "New note")
                          }
                      }
                  },
                  bottomBar = {
                      if (vm.screen != Screen.EDITOR) {
                          NavigationBar {
                              NavigationBarItem(
                                  selected = vm.screen == Screen.HOME,
                                  onClick = { vm.navigate(Screen.HOME) },
                                  icon = { Icon(Icons.Default.Home, contentDescription = null) },
                                  label = { Text("Home") }
                              )
                              NavigationBarItem(
                                  selected = vm.screen == Screen.FAVORITES,
                                  onClick = { vm.navigate(Screen.FAVORITES) },
                                  icon = { Icon(Icons.Default.Star, contentDescription = null) },
                                  label = { Text("Stars") }
                              )
                              NavigationBarItem(
                                  selected = vm.screen == Screen.ARCHIVE,
                                  onClick = { vm.navigate(Screen.ARCHIVE) },
                                  icon = { Icon(Icons.Default.Archive, contentDescription = null) },
                                  label = { Text("Archive") }
                              )
                              NavigationBarItem(
                                  selected = vm.screen == Screen.TRASH,
                                  onClick = { vm.navigate(Screen.TRASH) },
                                  icon = { Icon(Icons.Default.Delete, contentDescription = null) },
                                  label = { Text("Trash") }
                              )
                          }
                      }
                  }
              ) { padding ->
                  Box(modifier = Modifier.padding(padding)) {
                      when (vm.screen) {
                          Screen.HOME -> HomeScreen(vm)
                          Screen.EDITOR -> EditorScreen(vm)
                          Screen.FAVORITES -> NotesListScreen(vm, "Favorites")
                          Screen.ARCHIVE -> NotesListScreen(vm, "Archive")
                          Screen.TRASH -> NotesListScreen(vm, "Trash")
                          Screen.SETTINGS -> SettingsScreen(vm)
                          Screen.ONBOARDING -> OnboardingScreen(vm)
                      }
                  }
              }
          }

          @Composable
          fun DeleteConfirmationDialog(vm: NotesViewModel) {
              val note = vm.showDeleteDialog ?: return

              AlertDialog(
                  onDismissRequest = { vm.dismissDeleteDialog() },
                  title = { Text("Move to Trash?") },
                  text = { Text("“${note.title}” will be moved to Trash. You can restore it later.") },
                  confirmButton = {
                      Button(onClick = { vm.moveToTrashConfirmed() }) {
                          Text("Move")
                      }
                  },
                  dismissButton = {
                      TextButton(onClick = { vm.dismissDeleteDialog() }) {
                          Text("Cancel")
                      }
                  }
              )
          }
          """)

          write(f"{base}/ui/screens/Common.kt", """
          package com.notes.app.ui.screens

          import androidx.compose.foundation.layout.*
          import androidx.compose.foundation.lazy.LazyColumn
          import androidx.compose.foundation.lazy.items
          import androidx.compose.foundation.shape.RoundedCornerShape
          import androidx.compose.material.icons.Icons
          import androidx.compose.material.icons.filled.*
          import androidx.compose.material3.*
          import androidx.compose.runtime.Composable
          import androidx.compose.ui.Alignment
          import androidx.compose.ui.Modifier
          import androidx.compose.ui.text.font.FontWeight
          import androidx.compose.ui.unit.dp
          import com.notes.app.Note
          import com.notes.app.NotesViewModel

          @Composable
          fun Dashboard(vm: NotesViewModel) {
              Row(
                  modifier = Modifier.fillMaxWidth(),
                  horizontalArrangement = Arrangement.spacedBy(12.dp)
              ) {
                  StatCard("Notes", vm.activeNotes.size.toString(), Modifier.weight(1f))
                  StatCard("Pinned", vm.pinnedNotes.size.toString(), Modifier.weight(1f))
                  StatCard("Stars", vm.activeNotes.count { it.favorite }.toString(), Modifier.weight(1f))
              }
          }

          @Composable
          fun StatCard(label: String, value: String, modifier: Modifier = Modifier) {
              Card(modifier = modifier, shape = RoundedCornerShape(22.dp)) {
                  Column(modifier = Modifier.padding(16.dp)) {
                      Text(value, style = MaterialTheme.typography.headlineMedium, fontWeight = FontWeight.Bold)
                      Text(label, style = MaterialTheme.typography.labelLarge)
                  }
              }
          }

          @Composable
          fun FolderFilters(vm: NotesViewModel) {
              LazyColumn(
                  modifier = Modifier.heightIn(max = 92.dp),
                  verticalArrangement = Arrangement.spacedBy(8.dp)
              ) {
                  item {
                      Row(horizontalArrangement = Arrangement.spacedBy(8.dp)) {
                          vm.folders.forEach { folder ->
                              FilterChip(
                                  selected = vm.selectedFolder == folder,
                                  onClick = { vm.selectFolder(folder) },
                                  label = { Text(folder) }
                              )
                          }
                      }
                  }
              }
          }

          @Composable
          fun NotesListContent(vm: NotesViewModel, list: List<Note>) {
              if (list.isEmpty()) {
                  EmptyState()
              } else {
                  LazyColumn(verticalArrangement = Arrangement.spacedBy(12.dp)) {
                      val sorted = list.sortedWith(compareByDescending<Note> { it.pinned }.thenByDescending { it.updatedAt })
                      items(sorted, key = { it.id }) { note ->
                          NoteCard(vm, note)
                      }
                  }
              }
          }

          @Composable
          fun NoteCard(vm: NotesViewModel, note: Note) {
              Card(
                  modifier = Modifier.fillMaxWidth(),
                  shape = RoundedCornerShape(24.dp),
                  onClick = { vm.edit(note) }
              ) {
                  Column(
                      modifier = Modifier.padding(18.dp),
                      verticalArrangement = Arrangement.spacedBy(10.dp)
                  ) {
                      Row(verticalAlignment = Alignment.CenterVertically) {
                          Column(modifier = Modifier.weight(1f)) {
                              Text(note.title, style = MaterialTheme.typography.titleLarge, fontWeight = FontWeight.Bold)
                              Text(note.updatedAt, style = MaterialTheme.typography.labelSmall)
                          }

                          if (note.pinned) {
                              Icon(Icons.Default.PushPin, contentDescription = null)
                          }
                      }

                      Text(note.body, style = MaterialTheme.typography.bodyMedium)

                      Row(horizontalArrangement = Arrangement.spacedBy(8.dp)) {
                          AssistChip(onClick = {}, label = { Text(note.folder) })
                          AssistChip(onClick = {}, label = { Text("#${note.tag}") })
                      }

                      Row(horizontalArrangement = Arrangement.spacedBy(4.dp)) {
                          IconButton(onClick = { vm.togglePin(note) }) {
                              Icon(Icons.Default.PushPin, contentDescription = "Pin")
                          }
                          IconButton(onClick = { vm.toggleFavorite(note) }) {
                              Icon(if (note.favorite) Icons.Default.Star else Icons.Default.StarBorder, contentDescription = "Favorite")
                          }
                          IconButton(onClick = { vm.duplicate(note) }) {
                              Icon(Icons.Default.ContentCopy, contentDescription = "Duplicate")
                          }

                          if (note.trashed || note.archived) {
                              IconButton(onClick = { vm.restore(note) }) {
                                  Icon(Icons.Default.Restore, contentDescription = "Restore")
                              }
                          } else {
                              IconButton(onClick = { vm.archive(note) }) {
                                  Icon(Icons.Default.Archive, contentDescription = "Archive")
                              }
                              IconButton(onClick = { vm.requestDelete(note) }) {
                                  Icon(Icons.Default.Delete, contentDescription = "Trash")
                              }
                          }

                          if (note.trashed) {
                              IconButton(onClick = { vm.deleteForever(note) }) {
                                  Icon(Icons.Default.DeleteForever, contentDescription = "Delete forever")
                              }
                          }
                      }
                  }
              }
          }

          @Composable
          fun EmptyState() {
              Box(
                  modifier = Modifier.fillMaxSize(),
                  contentAlignment = Alignment.Center
              ) {
                  Column(
                      horizontalAlignment = Alignment.CenterHorizontally,
                      verticalArrangement = Arrangement.spacedBy(12.dp)
                  ) {
                      Icon(Icons.Default.NoteAlt, contentDescription = null, modifier = Modifier.size(56.dp))
                      Text("No notes here", style = MaterialTheme.typography.titleLarge, fontWeight = FontWeight.Bold)
                      Text("Create, restore, or search notes to see them here.")
                  }
              }
          }
          """)

