          PY

      - name: Create debug keystore
        run: |
          mkdir -p "$ANDROID_USER_HOME"
          keytool -genkeypair \
            -v \
            -keystore "$ANDROID_USER_HOME/debug.keystore" \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" || true

      - name: Create Gradle wrapper
        run: |
          gradle wrapper --gradle-version 8.10.2
          chmod +x ./gradlew

      - name: Build APK with logs
        run: |
          set -o pipefail
          mkdir -p build-logs
          ./gradlew clean assembleDebug --stacktrace --info 2>&1 | tee build-logs/notes-production-build.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: notes-production-debug-apk
          path: |
            **/build/outputs/apk/debug/*.apk

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notes-production-build-logs
          path: |
            build-logs/
            **/build/reports/
            **/outputs/logs/

      - name: Commit upgraded production app
        if: always()
        run: |
          git config user.name "Notes Production Builder"
          git config user.email "actions@github.com"

          git add .
          git commit -m "Upgrade Notes app to production structure" || echo "No changes to commit"
          git push || echo "Push skipped"
