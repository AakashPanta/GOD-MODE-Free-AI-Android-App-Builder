name: Fix Kotlin Build Errors

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-kotlin:
    name: Fix Kotlin Syntax and Validate Build
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      ANDROID_HOME: /opt/android-sdk
      ANDROID_SDK_ROOT: /opt/android-sdk
      ANDROID_USER_HOME: /home/runner/.android
      GRADLE_USER_HOME: /home/runner/.gradle
      JAVA_TOOL_OPTIONS: -Duser.home=/home/runner

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare environment
        shell: bash
        run: |
          set -e
          mkdir -p "$ANDROID_USER_HOME" "$GRADLE_USER_HOME" build-logs
          chmod -R 777 "$ANDROID_USER_HOME" "$GRADLE_USER_HOME"

      - name: Install required packages
        shell: bash
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y curl wget unzip zip git openjdk-17-jdk gradle python3

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android SDK
        shell: bash
        run: |
          set -e
          sudo mkdir -p "$ANDROID_HOME/cmdline-tools"
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          sudo rm -rf "$ANDROID_HOME/cmdline-tools/latest"
          sudo mv cmdline-tools "$ANDROID_HOME/cmdline-tools/latest"
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$ANDROID_HOME/platform-tools" >> "$GITHUB_PATH"
          yes | sudo "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true
          sudo "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Rewrite Kotlin files
        shell: bash
        run: |
          set -e
          python3 - <<'PY'
          from pathlib import Path
          import base64
          import re

          vm = Path("app/src/main/java/com/notes/app/NotesViewModel.kt")
          if vm.exists():
              text = vm.read_text()
              text = re.sub(
                  r'it\.body\.split\(Regex\([^)]+\)\)\.filter',
                  'it.body.split(Regex("""\\\\s+""")).filter',
                  text
              )
              vm.write_text(text)

          editor = Path("app/src/main/java/com/notes/app/ui/screens/EditorScreen.kt")
          editor.parent.mkdir(parents=True, exist_ok=True)
          editor.write_text(base64.b64decode("").decode())
          print("Kotlin files rewritten successfully.")
          PY

      - name: Ensure Gradle wrapper
        shell: bash
        run: |
          set -e
          if [ ! -f ./gradlew ]; then
            gradle wrapper --gradle-version 8.7
          fi
          chmod +x ./gradlew

      - name: Build debug APK
        shell: bash
        run: |
          set -o pipefail
          ./gradlew clean assembleDebug --stacktrace --info 2>&1 | tee build-logs/fix-kotlin-debug-build.log

      - name: Commit Kotlin build fix
        if: ${{ success() }}
        shell: bash
        run: |
          git config user.name "Kotlin Build Fix Bot"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Fix Kotlin compile errors in Notes V4 MVP" || echo "No changes to commit"
          git push || echo "Push skipped"

      - name: Upload fix build logs
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: fix-kotlin-build-logs
          path: |
            build-logs/
            **/build/reports/
            **/outputs/logs/

      - name: Upload verified debug APK
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: notes-v4-mvp-fixed-debug-apk
          path: |
            **/build/outputs/apk/debug/*.apk
