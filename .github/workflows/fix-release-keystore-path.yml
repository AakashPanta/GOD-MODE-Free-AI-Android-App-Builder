name: Fix Release Keystore Path

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    name: Fix Gradle Release Keystore Path
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Patch signing keystore path
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          gradle = Path("app/build.gradle.kts")

          if not gradle.exists():
              raise SystemExit("app/build.gradle.kts not found")

          text = gradle.read_text()

          text = re.sub(
              r'storeFile\s*=\s*file\([^)]+\)',
              'storeFile = file("signing/notes-release.jks")',
              text
          )

          gradle.write_text(text)
          PY

      - name: Ensure app signing directory exists
        run: |
          mkdir -p app/signing
          touch app/signing/.gitkeep

      - name: Commit fix
        run: |
          git config user.name "Keystore Path Fix Bot"
          git config user.email "actions@github.com"

          git add app/build.gradle.kts app/signing/.gitkeep
          git commit -m "Fix release keystore path" || echo "No changes to commit"
          git push || echo "Push skipped"
