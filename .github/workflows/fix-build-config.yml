name: Fix Build Configuration FINAL

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-config:
    name: Fix Build Configuration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fix app Gradle config
        run: |
          mkdir -p app

          cat > app/build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }

          android {
              namespace = "com.notes.app"
              compileSdk = 34

              defaultConfig {
                  applicationId = "com.notes.app"
                  minSdk = 24
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0"
              }

              buildTypes {
                  release {
                      isMinifyEnabled = false
                  }
              }

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = "17"
              }

              buildFeatures {
                  compose = true
              }

              composeOptions {
                  kotlinCompilerExtensionVersion = "1.5.14"
              }
          }

          dependencies {
              implementation("androidx.core:core-ktx:1.13.1")
              implementation("androidx.activity:activity-compose:1.9.0")
              implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.8.4")
              implementation("androidx.lifecycle:lifecycle-viewmodel-compose:2.8.4")

              implementation(platform("androidx.compose:compose-bom:2024.06.00"))
              implementation("androidx.compose.ui:ui")
              implementation("androidx.compose.foundation:foundation")
              implementation("androidx.compose.material3:material3")
              implementation("androidx.compose.material:material-icons-extended")
              implementation("androidx.compose.ui:ui-tooling-preview")

              debugImplementation("androidx.compose.ui:ui-tooling")
          }
          EOF

      - name: Fix root Gradle config
        run: |
          cat > build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application") version "8.2.2" apply false
              id("org.jetbrains.kotlin.android") version "1.9.24" apply false
          }
          EOF

      - name: Fix settings.gradle.kts
        run: |
          cat > settings.gradle.kts <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = "Notes"
          include(":app")
          EOF

      - name: Fix gradle.properties
        run: |
          cat > gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.enableJetifier=true
          kotlin.code.style=official
          EOF

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Ensure Gradle wrapper
        run: |
          if [ ! -f ./gradlew ]; then
            gradle wrapper --gradle-version 8.7
          fi

          chmod +x ./gradlew

      - name: Build Debug APK
        run: |
          ./gradlew clean assembleDebug --stacktrace

      - name: Commit fix
        run: |
          git config user.name "Build Fix Bot"
          git config user.email "actions@github.com"

          git add .
          git commit -m "Fix Kotlin Compose Gradle compatibility" || echo "No changes"
          git push || echo "Push skipped"
